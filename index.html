    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAYZBldRXfzXX_CAGBzDEoz-SduPA1g_S8",
            authDomain: "kollektivet-fc493.firebaseapp.com",
            databaseURL: "https://kollektivet-fc493-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kollektivet-fc493",
            storageBucket: "kollektivet-fc493.firebasestorage.app",
            messagingSenderId: "131176107292",
            appId: "1:131176107292:web:1a375b8560e00bba4b7ed9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const defaultTaskTypes = [
            { id: 1, name: "Redd sengen", points: 10, icon: 'bed' },
            { id: 2, name: "Laget kaffe", points: 5, icon: 'mug-hot' },
            { id: 3, name: "Tatt oppvasken", points: 15, icon: 'utensils' },
            { id: 4, name: "Gått med søpla", points: 20, icon: 'trash' },
            { id: 5, name: "Vasket gulvet", points: 50, icon: 'broom' }
        ];

        let members = [], taskTypes = [], history = [], myChart, selectedTasksOnScreen = [];
        let activePeriod = 'today';
        
        // LYD-FUNKSJON TILPASSET MOBIL
        // Flytt denne ut av funksjonen så vi gjenbruker samme objekt
let globalAudio = null;

function playIntroSound(durationSeconds = 7) {
    const audioUrl = 'https://raw.githubusercontent.com/aasleik/Kollektivet/main/Todd%20Terje%20-%20Inspector%20Norse%20(2)-%5BAudioTrimmer.com%5D.mp3';
    
    // Hvis lydobjektet ikke finnes, lag det. Hvis det finnes, stopp og nullstill det.
    if (!globalAudio) {
        globalAudio = new Audio(audioUrl);
    } else {
        globalAudio.pause();
        globalAudio.currentTime = 0;
    }
    
    globalAudio.volume = 0;

    // Spill av
    globalAudio.play().then(() => {
        // Fade inn
        let fadeIn = setInterval(() => {
            if (globalAudio.volume < 0.3) {
                globalAudio.volume = Math.min(0.9, globalAudio.volume + 0.1);
            } else {
                clearInterval(fadeIn);
            }
        }, 100);

        // Fade ut etter gitt tid
        setTimeout(() => {
            let fadeOut = setInterval(() => {
                if (globalAudio && globalAudio.volume > 0.05) {
                    globalAudio.volume = Math.max(0, globalAudio.volume - 0.05);
                } else if (globalAudio) {
                    globalAudio.pause();
                    globalAudio.currentTime = 0;
                    clearInterval(fadeOut);
                }
            }, 100);
        }, durationSeconds * 1000);
        
    }).catch(e => {
        console.error("Kunne ikke spille lyd:", e);
    });
}

        db.ref('/').on('value', (snapshot) => {
            const raw = snapshot.val();
            const isFirstLoad = raw === null;
            const data = raw || {};
            members = data.members || [];
            taskTypes = isFirstLoad ? defaultTaskTypes : (data.taskTypes || []);
            history = data.history || [];
            fixDuplicateColors();
            renderAll();
        });

        function sync() { db.ref('/').set({ members, taskTypes, history }); }

        const allColors = [
            '#F87171', '#60A5FA', '#34D399', '#FBBF24', '#A78BFA', '#F472B6', '#FB923C', '#22D3EE', '#818CF8', '#A3E635', '#E879F9', '#2DD4BF', '#FCA5A5', '#93C5FD', '#6EE7B7', '#FDE047', '#C4B5FD', '#F9A8D4', '#67E8F9', '#BEF264'
        ];

        function fixDuplicateColors() {
            const usedColors = new Set();
            let changed = false;
            members.forEach(m => {
                if (usedColors.has(m.color) || !m.color) {
                    const available = allColors.filter(c => !usedColors.has(c));
                    m.color = available.length > 0 ? available[0] : allColors[Math.floor(Math.random() * allColors.length)];
                    changed = true;
                }
                usedColors.add(m.color);
            });
            if (changed) sync();
        }

        const periods = [
            { key: 'today', label: 'I dag' },
            { key: 'yesterday', label: 'I går' },
            { key: 'thisWeek', label: 'Denne uken' },
            { key: 'lastWeek', label: 'Forrige uke' },
            { key: 'thisMonth', label: 'Denne måneden' },
            { key: 'lastMonth', label: 'Forrige måned' },
            { key: 'all', label: 'Alltid' }
        ];

        function getDateRange(key) {
            const now = new Date();
            const startOfDay = d => new Date(d.getFullYear(), d.getMonth(), d.getDate());
            const today = startOfDay(now);
            switch(key) {
                case 'today': return { start: today, end: new Date(today.getTime() + 86400000) };
                case 'yesterday': { const y = new Date(today.getTime() - 86400000); return { start: y, end: today }; }
                case 'thisWeek': { const d = now.getDay(); const diff = d === 0 ? 6 : d - 1; const mon = new Date(today.getTime() - diff * 86400000); return { start: mon, end: new Date(today.getTime() + 86400000) }; }
                case 'lastWeek': { const d = now.getDay(); const diff = d === 0 ? 6 : d - 1; const thisMon = new Date(today.getTime() - diff * 86400000); return { start: new Date(thisMon.getTime() - 7 * 86400000), end: thisMon }; }
                case 'thisMonth': return { start: new Date(now.getFullYear(), now.getMonth(), 1), end: new Date(today.getTime() + 86400000) };
                case 'lastMonth': return { start: new Date(now.getFullYear(), now.getMonth() - 1, 1), end: new Date(now.getFullYear(), now.getMonth(), 1) };
                case 'all': return { start: new Date(0), end: new Date(today.getTime() + 86400000) };
            }
        }

        function filterHistory(key) {
            const { start, end } = getDateRange(key);
            return history.filter(h => { const d = new Date(h.date); return d >= start && d < end; });
        }

        function getPointsForPeriod(memberId, key) {
            return filterHistory(key).filter(h => h.userId === memberId).reduce((sum, h) => sum + h.points, 0);
        }

        function setPeriod(key) {
            activePeriod = key;
            renderAll();
        }

        function renderTodayHistory() {
            const hEl = document.getElementById('todayHistory');
            const headingEl = document.getElementById('logHeading');
            const periodLabel = periods.find(p => p.key === activePeriod).label;
            headingEl.innerText = periodLabel;

            const log = filterHistory(activePeriod).sort((a, b) => new Date(b.date) - new Date(a.date));

            if (!log.length) { hEl.innerHTML = `<p class="text-center text-textSub text-sm py-10 opacity-50">Ingen oppgaver registrert – ${periodLabel.toLowerCase()}.</p>`; return; }

            const dateGroups = {};
            const dateGroupOrder = [];
            log.forEach(h => {
                const d = new Date(h.date);
                const dk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                if (!dateGroups[dk]) { dateGroups[dk] = { date: d, items: [] }; dateGroupOrder.push(dk); }
                dateGroups[dk].items.push(h);
            });
            const _today = new Date();
            const _yesterday = new Date(_today.getTime() - 86400000);

            const rendered = dateGroupOrder.map(dk => {
                const grp = dateGroups[dk];
                const gd = grp.date;
                let dlabel;
                if (gd.toDateString() === _today.toDateString()) dlabel = 'I dag';
                else if (gd.toDateString() === _yesterday.toDateString()) dlabel = 'I går';
                else { dlabel = gd.toLocaleDateString('no-NO', { weekday: 'long', day: 'numeric', month: 'long' }); dlabel = dlabel.charAt(0).toUpperCase() + dlabel.slice(1); }

                const itemsHtml = grp.items.map(h => {
                    const m = members.find(mem => String(mem.id) === String(h.userId));
                    if(!m) return "";
                    const init = m.name.substring(0,2).toUpperCase();
                    const taskCount = h.tasks.length;
                    const taskLabel = taskCount > 1 ? `${taskCount} oppgaver` : '1 oppgave';
                    return `<div class="swipe-item rounded-2xl" data-id="${h.id}" oncontextmenu="showContextMenu(event, ${h.id})">
                    <div class="swipe-actions">
                        <button class="action-date" onclick="openDatePicker(${h.id})"><i class="fas fa-calendar-alt text-base"></i><span>Dato</span></button>
                        <button class="action-delete" onclick="undo(${h.id})"><i class="fas fa-trash-alt text-base"></i><span>Slett</span></button>
                    </div>
                    <div class="swipe-content flex gap-4 items-center p-3 rounded-2xl">
                        <button class="desktop-menu-btn" onclick="event.stopPropagation(); toggleDesktopMenu(${h.id}, this)"><i class="fas fa-ellipsis-v"></i></button>
                        <span class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-xs shadow-lg shrink-0" style="background:${m.color}">${init}</span>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm leading-tight font-medium">${m.name.split(' ')[0]} har <span class="text-taskCyan">${h.tasks.join(', ')}</span></p>
                            <p class="text-[10px] text-textSub uppercase mt-0.5">+${h.points} poeng · ${taskLabel}</p>
                        </div>
                    </div>
                    </div>`;
                }).join('');
                if (!itemsHtml.trim()) return '';
                return `<div class="mb-2"><p class="text-xs font-bold text-textSub uppercase tracking-widest mb-2 px-1">${dlabel}</p><div class="space-y-2">${itemsHtml}</div></div>`;
            }).join('');
            hEl.innerHTML = rendered.trim() || `<p class="text-center text-textSub text-sm py-10 opacity-50">Ingen oppgaver registrert – ${periodLabel.toLowerCase()}.</p>`;
            initSwipeHandlers();
        }

        let swipeStartY = 0, swipeStartX = 0, activeSwipeItem = null;
        function initSwipeHandlers() {
            const items = document.querySelectorAll('.swipe-item, .admin-swipe-item');
            items.forEach(item => {
                const content = item.querySelector('.swipe-content');
                const actions = item.querySelector('.swipe-actions');
                let startX = 0, currentX = 0, isSwiping = false;

                item.ontouchstart = (e) => { startX = e.touches[0].clientX; isSwiping = true; actions.style.visibility = 'visible'; };
                item.ontouchmove = (e) => {
                    if (!isSwiping) return;
                    currentX = e.touches[0].clientX - startX;
                    if (currentX < -10) {
                        const move = Math.max(currentX, -150);
                        content.style.transform = `translateX(${move}px)`;
                        e.preventDefault();
                    } else {
                        content.style.transform = '';
                    }
                };
                item.ontouchend = () => {
                    isSwiping = false;
                    if (currentX < -60) {
                        content.style.transform = `translateX(-144px)`;
                    } else {
                        content.style.transform = '';
                        setTimeout(() => actions.style.visibility = 'hidden', 200);
                    }
                };
            });
        }

        function renderMiniCalendar(historyId, selectedDate) {
            const overlay = document.createElement('div');
            overlay.className = 'mini-calendar-overlay';
            overlay.onclick = () => overlay.remove();
            
            const now = new Date();
            let viewMonth = selectedDate.getMonth();
            let viewYear = selectedDate.getFullYear();

            const draw = (m, y) => {
                const firstDay = new Date(y, m, 1).getDay();
                const daysInMonth = new Date(y, m + 1, 0).getDate();
                const startOffset = firstDay === 0 ? 6 : firstDay - 1;
                const monthName = new Date(y, m).toLocaleString('no-NO', { month: 'long' });
                
                let html = `<div class="mini-calendar" onclick="event.stopPropagation()">
                    <div class="cal-header">
                        <button class="text-textSub p-2" onclick="changeM(-1)"><i class="fas fa-chevron-left"></i></button>
                        <div class="flex flex-col items-center">
                            <span class="text-white font-bold capitalize">${monthName}</span>
                            <div class="cal-year-select relative">
                                <button onclick="changeY(-1)"><i class="fas fa-minus scale-75"></i></button>
                                <span class="cal-year-label" onclick="toggleYearDropdown()">${y}</span>
                                <button onclick="changeY(1)"><i class="fas fa-plus scale-75"></i></button>
                                <div id="calYearDropdown" class="cal-year-dropdown hidden"></div>
                            </div>
                        </div>
                        <button class="text-textSub p-2" onclick="changeM(1)"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div class="cal-grid">
                        ${['M','T','O','T','F','L','S'].map(d => `<div class="cal-day-label">${d}</div>`).join('')}
                        ${Array(startOffset).fill('<div class="cal-day other-month"></div>').join('')}`;
                
                for(let d=1; d<=daysInMonth; d++) {
                    const date = new Date(y, m, d);
                    const isFuture = date > now;
                    const isSel = date.toDateString() === selectedDate.toDateString();
                    const isToday = date.toDateString() === now.toDateString();
                    html += `<div class="cal-day ${isFuture?'future':''} ${isSel?'selected':''} ${isToday?'today':''}" onclick="selectD(${y},${m},${d})">${d}</div>`;
                }
                html += `</div><button onclick="this.closest('.mini-calendar-overlay').remove()" class="w-full mt-6 py-3 rounded-xl bg-white/5 text-textSub font-bold text-sm">Avbryt</button></div>`;
                overlay.innerHTML = html;
            };

            window.changeM = (v) => { viewMonth += v; if(viewMonth>11){viewMonth=0; viewYear++;} if(viewMonth<0){viewMonth=11; viewYear--;} draw(viewMonth, viewYear); };
            window.changeY = (v) => { viewYear += v; draw(viewMonth, viewYear); };
            window.toggleYearDropdown = () => {
                const d = document.getElementById('calYearDropdown');
                d.classList.toggle('hidden');
                if(!d.classList.contains('hidden')) {
                    const startY = 2023, endY = new Date().getFullYear();
                    let yHtml = '';
                    for(let i=endY; i>=startY; i--) yHtml += `<button class="${i===viewYear?'active-year':''}" onclick="selectY(${i})">${i}</button>`;
                    d.innerHTML = yHtml;
                }
            };
            window.selectY = (y) => { viewYear = y; draw(viewMonth, viewYear); };
            window.selectD = (y, m, d) => {
                const h = history.find(item => item.id === historyId);
                const oldDate = new Date(h.date);
                const newDate = new Date(y, m, d, oldDate.getHours(), oldDate.getMinutes(), oldDate.getSeconds());
                h.date = newDate.toISOString();
                sync();
                overlay.remove();
            };

            draw(viewMonth, viewYear);
            document.body.appendChild(overlay);
        }

        let currentDesktopMenu = null;
        function toggleDesktopMenu(id, btn) {
            if (currentDesktopMenu) { currentDesktopMenu.remove(); if (currentDesktopMenu.dataset.id == id) { currentDesktopMenu = null; return; } }
            const rect = btn.getBoundingClientRect();
            const menu = document.createElement('div');
            menu.className = 'desktop-dropdown';
            menu.dataset.id = id;
            menu.style.top = `${rect.bottom + 8}px`;
            menu.style.left = `${rect.right - 160}px`;
            menu.innerHTML = `<button onclick="openDatePicker(${id})"><i class="fas fa-calendar-alt"></i> Endre dato</button><button class="delete-option" onclick="undo(${id})"><i class="fas fa-trash-alt"></i> Slett bidrag</button>`;
            document.body.appendChild(menu);
            currentDesktopMenu = menu;
            btn.classList.add('active');
            const close = (e) => { if(!menu.contains(e.target) && e.target !== btn) { menu.remove(); btn.classList.remove('active'); document.removeEventListener('click', close); currentDesktopMenu = null; } };
            setTimeout(() => document.addEventListener('click', close), 10);
        }

        function showContextMenu(e, id) { if (window.innerWidth > 1024) { e.preventDefault(); const items = document.querySelectorAll('.swipe-item'); items.forEach(item => { if (item.dataset.id == id) { const btn = item.querySelector('.desktop-menu-btn'); toggleDesktopMenu(id, btn); } }); } }
        function showMemberContextMenu(e, id) { if (window.innerWidth > 1024) { e.preventDefault(); const items = document.querySelectorAll('.admin-swipe-item'); items.forEach(item => { if (item.dataset.id == id) { const btn = item.querySelector('.desktop-menu-btn'); toggleMemberDesktopMenu(id, btn); } }); } }
        function showTaskContextMenu(e, id) { if (window.innerWidth > 1024) { e.preventDefault(); const items = document.querySelectorAll('.admin-swipe-item'); items.forEach(item => { if (item.dataset.id == id) { const btn = item.querySelector('.desktop-menu-btn'); toggleTaskDesktopMenu(id, btn); } }); } }
    </script>
