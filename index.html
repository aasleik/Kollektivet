<html lang="no">
<head>

    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        input, select, textarea { font-size: 16px !important; }
        select { -webkit-appearance: none; }
        button, a, [role="button"], .swipe-item, .admin-swipe-item { min-height: 44px; }
        @media (max-width: 640px) {
            input, select, textarea { padding: 10px 12px; border-radius: 8px; }
        }
        .swipe-item { position: relative; overflow: hidden; }
        .swipe-item .swipe-content { position: relative; z-index: 1; background: #0A0E17; transition: transform 0.2s ease, padding-left 0.15s; }
        .swipe-item .swipe-actions { position: absolute; right: 0; top: 0; bottom: 0; display: flex; align-items: stretch; visibility: hidden; }
        .swipe-item .swipe-actions button { display: flex; align-items: center; justify-content: center; width: 72px; font-size: 12px; font-weight: bold; color: white; flex-direction: column; gap: 4px; }
        .swipe-item .swipe-actions .action-date { background: #3B82F6; border-radius: 0; }
        .swipe-item .swipe-actions .action-delete { background: #EF4444; border-radius: 0; }
        .mini-calendar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .mini-calendar { background: #151C2C; border-radius: 20px; padding: 20px; width: 100%; max-width: 320px; border: 1px solid rgba(255,255,255,0.1); }
        .mini-calendar .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .mini-calendar .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .mini-calendar .cal-day { padding: 8px 0; border-radius: 10px; font-size: 14px; cursor: pointer; transition: background 0.15s; }
        .mini-calendar .cal-day:hover { background: rgba(255,255,255,0.1); }
        .mini-calendar .cal-day.selected { background: #7C3AED; color: white; font-weight: bold; }
        .mini-calendar .cal-day.today { outline: 2px solid #7C3AED; outline-offset: -2px; }
        .mini-calendar .cal-day.future { opacity: 0.25; cursor: not-allowed; pointer-events: none; }
        .mini-calendar .cal-day.other-month { opacity: 0.3; }
        .mini-calendar .cal-day-label { font-size: 11px; color: #8D9CB1; padding: 4px 0; font-weight: bold; }
        .mini-calendar .cal-year-select { display: flex; align-items: center; gap: 6px; }
        .mini-calendar .cal-year-select button { background: none; border: none; color: #8D9CB1; cursor: pointer; padding: 2px 6px; font-size: 12px; border-radius: 6px; transition: background 0.15s, color 0.15s; }
        .mini-calendar .cal-year-select button:hover { background: rgba(255,255,255,0.1); color: white; }
        .mini-calendar .cal-year-label { font-size: 13px; color: #7C3AED; font-weight: bold; cursor: pointer; min-width: 42px; text-align: center; }
        .cal-year-dropdown { position: absolute; left: 0; top: 100%; background: #1E2538; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; max-height: 180px; overflow-y: auto; z-index: 10; min-width: 80px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .cal-year-dropdown button { display: block; width: 100%; padding: 8px 16px; background: none; border: none; color: #CBD5E1; font-size: 13px; cursor: pointer; text-align: center; transition: background 0.15s; }
        .cal-year-dropdown button:hover { background: rgba(255,255,255,0.06); }
        .cal-year-dropdown button.active-year { color: #7C3AED; font-weight: bold; background: rgba(124,58,237,0.1); }
        .swipe-item .desktop-menu-btn { display: none; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); z-index: 10; background: rgba(255,255,255,0.08); border: none; color: #8D9CB1; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; align-items: center; justify-content: center; transition: background 0.15s, color 0.15s; }
        .swipe-item .desktop-menu-btn:hover { background: rgba(255,255,255,0.15); color: white; }
        @media (hover: hover) and (pointer: fine) {
            .swipe-item:hover .desktop-menu-btn, .swipe-item .desktop-menu-btn.active { display: flex; }
            .swipe-item:hover .swipe-content { padding-right: 48px; }
        }
        .desktop-dropdown { position: fixed; z-index: 9999; background: #1E2538; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.5); min-width: 160px; }
        .desktop-dropdown button { display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px 16px; background: none; border: none; color: #CBD5E1; font-size: 13px; font-weight: 500; cursor: pointer; text-align: left; transition: background 0.15s; }
        .desktop-dropdown button:hover { background: rgba(255,255,255,0.06); }
        .desktop-dropdown button.delete-option { color: #F87171; }
        .desktop-dropdown button.delete-option:hover { background: rgba(239,68,68,0.1); }
        .admin-swipe-item { position: relative; overflow: hidden; border-radius: 12px; }
        .admin-swipe-item .swipe-content { position: relative; z-index: 1; background: #0A0E17; transition: transform 0.2s ease, padding-right 0.15s; }
        .admin-swipe-item .swipe-actions { position: absolute; right: 0; top: 0; bottom: 0; display: flex; align-items: stretch; visibility: hidden; }
        .admin-swipe-item .swipe-actions button { display: flex; align-items: center; justify-content: center; width: 72px; font-size: 12px; font-weight: bold; color: white; flex-direction: column; gap: 4px; }
        .admin-swipe-item .swipe-actions .action-edit { background: #3B82F6; border-radius: 0; }
        .admin-swipe-item .swipe-actions .action-delete { background: #EF4444; border-radius: 0; }
        .admin-swipe-item .desktop-menu-btn { display: none; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); z-index: 10; background: rgba(255,255,255,0.08); border: none; color: #8D9CB1; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; align-items: center; justify-content: center; transition: background 0.15s, color 0.15s; }
        .admin-swipe-item .desktop-menu-btn:hover { background: rgba(255,255,255,0.15); color: white; }
        @media (hover: hover) and (pointer: fine) {
            .admin-swipe-item:hover .desktop-menu-btn, .admin-swipe-item .desktop-menu-btn.active { display: flex; }
            .admin-swipe-item:hover .swipe-content { padding-right: 48px; }
        }
    </style>
</head>

    <script>
        // --- LYD-LOGIKK: ROBUST LØSNING FOR MOBIL/DESKTOP ---
        let isAudioPlaying = false;
        const audioUrl = 'https://raw.githubusercontent.com/aasleik/Kollektivet/main/Todd%20Terje%20-%20Inspector%20Norse%20(2)-%5BAudioTrimmer.com%5D.mp3';
        const globalAudio = new Audio(audioUrl);

        // "Unlocker" for mobil: Aktiverer lyden ved første brukerinteraksjon på skjermen
        const unlockAudio = () => {
            globalAudio.play().then(() => {
                globalAudio.pause();
                globalAudio.currentTime = 0;
            }).catch(() => {});
            document.removeEventListener('click', unlockAudio);
            document.removeEventListener('touchstart', unlockAudio);
        };
        document.addEventListener('click', unlockAudio);
        document.addEventListener('touchstart', unlockAudio);

        function playIntroSound() {
            // KRITERIE: Hvis den allerede spiller, gjør ingenting (ingen overlapp eller omstart)
            if (isAudioPlaying) return;

            isAudioPlaying = true;
            globalAudio.volume = 0;
            globalAudio.currentTime = 0;

            globalAudio.play().then(() => {
                // Fade inn (opp til 0.3 volum over ca 0.5 sekunder)
                let fadeIn = setInterval(() => {
                    if (globalAudio.volume < 0.25) {
                        globalAudio.volume = Math.min(0.3, globalAudio.volume + 0.05);
                    } else {
                        clearInterval(fadeIn);
                    }
                }, 100);

                // Spill i 7 sekunder før fade-out starter
                setTimeout(() => {
                    let fadeOut = setInterval(() => {
                        if (globalAudio.volume > 0.05) {
                            globalAudio.volume -= 0.05;
                        } else {
                            clearInterval(fadeOut);
                            globalAudio.pause();
                            isAudioPlaying = false; // Nå er den klar for å kunne startes på nytt ved neste klikk
                        }
                    }, 100);
                }, 7000);
            }).catch(() => {
                isAudioPlaying = false;
            });
        }
        // --- SLUTT LYD-LOGIKK ---

        // --- INNSTILLINGSMUSIKK: FADE INN/UT VED TANNHJUL ---
        // Lim inn URL til ønsket sang her:
        const SETTINGS_MUSIC_URL = 'LINN INN URL HER';

        let settingsMusicPlaying = false;
        let settingsFadeInterval = null;
        const settingsAudio = new Audio(SETTINGS_MUSIC_URL);
        settingsAudio.loop = true;
        settingsAudio.volume = 0;

        // Unlocker for innstillingsmusikk på mobil
        const unlockSettingsAudio = () => {
            settingsAudio.play().then(() => {
                settingsAudio.pause();
                settingsAudio.currentTime = 0;
            }).catch(() => {});
            document.removeEventListener('click', unlockSettingsAudio);
            document.removeEventListener('touchstart', unlockSettingsAudio);
        };
        document.addEventListener('click', unlockSettingsAudio);
        document.addEventListener('touchstart', unlockSettingsAudio);

        function startSettingsMusic() {
            if (settingsMusicPlaying) return;
            settingsMusicPlaying = true;
            if (settingsFadeInterval) { clearInterval(settingsFadeInterval); settingsFadeInterval = null; }
            settingsAudio.volume = 0;
            settingsAudio.play().then(() => {
                settingsFadeInterval = setInterval(() => {
                    if (settingsAudio.volume < 0.18) {
                        settingsAudio.volume = Math.min(0.2, settingsAudio.volume + 0.01);
                    } else {
                        clearInterval(settingsFadeInterval);
                        settingsFadeInterval = null;
                    }
                }, 50);
            }).catch(() => { settingsMusicPlaying = false; });
        }

        function stopSettingsMusic() {
            if (!settingsMusicPlaying) return;
            if (settingsFadeInterval) { clearInterval(settingsFadeInterval); settingsFadeInterval = null; }
            settingsFadeInterval = setInterval(() => {
                if (settingsAudio.volume > 0.01) {
                    settingsAudio.volume = Math.max(0, settingsAudio.volume - 0.01);
                } else {
                    clearInterval(settingsFadeInterval);
                    settingsFadeInterval = null;
                    settingsAudio.pause();
                    settingsAudio.currentTime = 0;
                    settingsMusicPlaying = false;
                }
            }, 50);
        }
        // --- SLUTT INNSTILLINGSMUSIKK ---

        const firebaseConfig = {
            apiKey: "AIzaSyAYZBldRXfzXX_CAGBzDEoz-SduPA1g_S8",
            authDomain: "kollektivet-fc493.firebaseapp.com",
            databaseURL: "https://kollektivet-fc493-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kollektivet-fc493",
            storageBucket: "kollektivet-fc493.firebasestorage.app",
            messagingSenderId: "131176107292",
            appId: "1:131176107292:web:1a375b8560e00bba4b7ed9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const defaultTaskTypes = [
            { id: 1, name: "Redd sengen", points: 10, icon: 'bed' },
            { id: 2, name: "Laget kaffe", points: 5, icon: 'mug-hot' },
            { id: 3, name: "Tatt oppvasken", points: 15, icon: 'utensils' },
            { id: 4, name: "Gått med søpla", points: 20, icon: 'trash' },
            { id: 5, name: "Vasket gulvet", points: 50, icon: 'broom' }
        ];

        let members = [], taskTypes = [], history = [], myChart, selectedTasksOnScreen = [];
        let activePeriod = 'today';

        db.ref('/').on('value', (snapshot) => {
            const raw = snapshot.val();
            const isFirstLoad = raw === null;
            const data = raw || {};
            members = data.members || [];
            taskTypes = isFirstLoad ? defaultTaskTypes : (data.taskTypes || []);
            history = data.history || [];
            fixDuplicateColors();
            renderAll();
        });

        function sync() { db.ref('/').set({ members, taskTypes, history }); }

        const allColors = [
            '#F87171', '#60A5FA', '#34D399', '#FBBF24', '#A78BFA', '#F472B6', '#FB923C', '#22D3EE', '#818CF8', '#A3E635', '#E879F9', '#2DD4BF', '#FCA5A5', '#93C5FD', '#6EE7B7', '#FDE047', '#C4B5FD', '#F9A8D4', '#67E8F9', '#BEF264'
        ];

        function fixDuplicateColors() {
            const usedColors = new Set();
            let changed = false;
            members.forEach(m => {
                if (usedColors.has(m.color) || !m.color) {
                    const available = allColors.filter(c => !usedColors.has(c));
                    m.color = available.length > 0 ? available[0] : allColors[Math.floor(Math.random() * allColors.length)];
                    changed = true;
                }
                usedColors.add(m.color);
            });
            if (changed) sync();
        }

        const periods = [
            { key: 'today', label: 'I dag' },
            { key: 'yesterday', label: 'I går' },
            { key: 'thisWeek', label: 'Denne uken' },
            { key: 'lastWeek', label: 'Forrige uke' },
            { key: 'thisMonth', label: 'Denne måneden' },
            { key: 'lastMonth', label: 'Forrige måned' },
            { key: 'all', label: 'Alltid' }
        ];

        function getDateRange(key) {
            const now = new Date();
            const startOfDay = d => new Date(d.getFullYear(), d.getMonth(), d.getDate());
            const today = startOfDay(now);
            switch(key) {
                case 'today': return { start: today, end: new Date(today.getTime() + 86400000) };
                case 'yesterday': { const y = new Date(today.getTime() - 86400000); return { start: y, end: today }; }
                case 'thisWeek': { const d = now.getDay(); const diff = d === 0 ? 6 : d - 1; const mon = new Date(today.getTime() - diff * 86400000); return { start: mon, end: new Date(today.getTime() + 86400000) }; }
                case 'lastWeek': { const d = now.getDay(); const diff = d === 0 ? 6 : d - 1; const thisMon = new Date(today.getTime() - diff * 86400000); return { start: new Date(thisMon.getTime() - 7 * 86400000), end: thisMon }; }
                case 'thisMonth': return { start: new Date(now.getFullYear(), now.getMonth(), 1), end: new Date(today.getTime() + 86400000) };
                case 'lastMonth': return { start: new Date(now.getFullYear(), now.getMonth() - 1, 1), end: new Date(now.getFullYear(), now.getMonth(), 1) };
                case 'all': return { start: new Date(0), end: new Date(today.getTime() + 86400000) };
            }
        }

        function filterHistory(key) {
            const { start, end } = getDateRange(key);
            return history.filter(h => { const d = new Date(h.date); return d >= start && d < end; });
        }

        function getPointsForPeriod(memberId, key) {
            return filterHistory(key).filter(h => h.userId === memberId).reduce((sum, h) => sum + h.points, 0);
        }

        function setPeriod(key) {
            activePeriod = key;
            renderAll();
        }

            }).join('');

            const sorted = [...membersWithPeriodPoints].sort((a,b) => b.periodPoints - a.periodPoints);

        function renderTodayHistory() {

            const log = filterHistory(activePeriod).sort((a, b) => new Date(b.date) - new Date(a.date));

            if (!log.length) { hEl.innerHTML = `<p class="text-center text-textSub text-sm py-10 opacity-50">Ingen oppgaver registrert – ${periodLabel.toLowerCase()}.</p>`; return; }

            const dateGroups = {};
            const dateGroupOrder = [];
            log.forEach(h => {
                const d = new Date(h.date);
                const dk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                if (!dateGroups[dk]) { dateGroups[dk] = { date: d, items: [] }; dateGroupOrder.push(dk); }
                dateGroups[dk].items.push(h);
            });
            const _today = new Date();
            const _yesterday = new Date(_today.getTime() - 86400000);

            const rendered = dateGroupOrder.map(dk => {
                const grp = dateGroups[dk];
                const gd = grp.date;
                let dlabel;
                if (gd.toDateString() === _today.toDateString()) dlabel = 'I dag';
                else if (gd.toDateString() === _yesterday.toDateString()) dlabel = 'I går';
                else { dlabel = gd.toLocaleDateString('no-NO', { weekday: 'long', day: 'numeric', month: 'long' }); dlabel = dlabel.charAt(0).toUpperCase() + dlabel.slice(1); }

                const itemsHtml = grp.items.map(h => {
                    const m = members.find(mem => String(mem.id) === String(h.userId));
                    if(!m) return "";
                    const init = m.name.substring(0,2).toUpperCase();

                                    <span class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-xs shadow-lg shrink-0" style="background:${m.color}">${init}</span>
                                    <div class="flex-1 min-w-0">
                                        <p class="text-sm leading-tight font-medium">${m.name.split(' ')[0]} har <span class="text-taskCyan">${h.tasks.join(', ')}</span></p>
                                        <p class="text-[10px] text-textSub uppercase mt-0.5">+${h.points} poeng · ${taskLabel}</p>
                                    </div>
                                </div>
                            </div>`;
                }).join('');
                if (!itemsHtml.trim()) return '';
                return `<div class="mb-2"><p class="text-xs font-bold text-textSub uppercase tracking-widest mb-2 px-1">${dlabel}</p><div class="space-y-2">${itemsHtml}</div></div>`;
            }).join('');
            hEl.innerHTML = rendered.trim() || `<p class="text-center text-textSub text-sm py-10 opacity-50">Ingen oppgaver registrert – ${periodLabel.toLowerCase()}.</p>`;
            initSwipeHandlers();

        function initSwipeHandlers() {
            const items = document.querySelectorAll('.swipe-item, .admin-swipe-item');
            items.forEach(item => {
                let startX = 0, currentX = 0, isDragging = false;
                const content = item.querySelector('.swipe-content');
                const actions = item.querySelector('.swipe-actions');
                const threshold = 50;

                item.addEventListener('touchstart', e => { startX = e.touches[0].clientX; isDragging = true; actions.style.visibility = 'visible'; content.style.transition = 'none'; }, {passive: true});
                item.addEventListener('touchmove', e => {
                    if (!isDragging) return;
                    currentX = e.touches[0].clientX - startX;
                    if (currentX > 0) currentX = 0;
                    if (currentX < -150) currentX = -150 - (Math.abs(currentX + 150) * 0.2);
                    content.style.transform = `translateX(${currentX}px)`;
                }, {passive: true});
                item.addEventListener('touchend', () => {
                    isDragging = false;
                    content.style.transition = 'transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28)';
                    if (currentX < -threshold) { content.style.transform = `translateX(-144px)`; }
                    else { content.style.transform = `translateX(0)`; setTimeout(() => { if (!isDragging) actions.style.visibility = 'hidden'; }, 300); }
                    currentX = 0;
                });
            });
        }

        function toggleDesktopMenu(id, btn, type = 'history') {
            const existing = document.querySelector('.desktop-dropdown');
            if (existing) {
                const parentId = existing.getAttribute('data-parent-id');
                existing.remove();
                document.querySelectorAll('.desktop-menu-btn').forEach(b => b.classList.remove('active'));
                if (parentId === String(id)) return;
            }

            btn.classList.add('active');
            const rect = btn.getBoundingClientRect();
            const menu = document.createElement('div');
            menu.className = 'desktop-dropdown';
            menu.setAttribute('data-parent-id', id);
            menu.style.top = `${rect.bottom + 8}px`;
            menu.style.left = `${rect.left - 130}px`;

            if (type === 'history') {
                menu.innerHTML = `
                    <button onclick="openDatePicker(${id})"><i class="fas fa-calendar-alt"></i> Endre dato</button>
                    <button class="delete-option" onclick="undo(${id})"><i class="fas fa-trash-alt"></i> Slett</button>
                `;
            } else {
                menu.innerHTML = `
                    <button onclick="openRenameModal('${type}', ${id})"><i class="fas fa-pen"></i> Endre</button>
                    <button class="delete-option" onclick="confirmDelete('${type}', ${id})"><i class="fas fa-trash-alt"></i> Slett</button>
                `;
            }

            document.body.appendChild(menu);
            const closeMenu = (e) => { if (!menu.contains(e.target) && e.target !== btn) { menu.remove(); btn.classList.remove('active'); document.removeEventListener('click', closeMenu); } };
            setTimeout(() => document.addEventListener('click', closeMenu), 10);
        }

        function openDatePicker(historyId) {
            const h = history.find(i => i.id === historyId);
            if (!h) return;
            renderCalendar(historyId, new Date(h.date).getFullYear(), new Date(h.date).getMonth(), new Date(h.date));
        }

        function renderCalendar(historyId, year, month, selectedDate) {
            const existing = document.getElementById('miniCalendarOverlay');
            if (existing) existing.remove();

            const overlay = document.createElement('div');
            overlay.id = 'miniCalendarOverlay';
            overlay.className = 'mini-calendar-overlay';

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const adjustedFirstDay = firstDay === 0 ? 6 : firstDay - 1;
            const now = new Date();

            let daysHtml = '';
            for (let i = 0; i < adjustedFirstDay; i++) daysHtml += `<div class="cal-day other-month"></div>`;
            for (let day = 1; day <= daysInMonth; day++) {
                const isSelected = selectedDate.getDate() === day && selectedDate.getMonth() === month && selectedDate.getFullYear() === year;
                const isToday = now.getDate() === day && now.getMonth() === month && now.getFullYear() === year;
                const isFuture = new Date(year, month, day) > now;
                daysHtml += `<div class="cal-day ${isSelected ? 'selected' : ''} ${isToday ? 'today' : ''} ${isFuture ? 'future' : ''}" 
                             onclick="selectCalendarDate(${historyId}, ${year}, ${month}, ${day})">${day}</div>`;
            }

            const monthNames = ["Januar", "Februar", "Mars", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Desember"];
            
            overlay.innerHTML = `
                <div class="mini-calendar" onclick="event.stopPropagation()">
                    <div class="cal-header">
                        <div class="cal-year-select" style="position:relative">
                            <span class="cal-year-label" onclick="toggleYearDropdown()">${monthNames[month]} ${year}</span>
                            <div id="yearDropdown" class="cal-year-dropdown hidden"></div>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="renderCalendar(${historyId}, ${month === 0 ? year - 1 : year}, ${month === 0 ? 11 : month - 1}, new Date('${selectedDate.toISOString()}'))" class="text-textSub px-2 py-1"><i class="fas fa-chevron-left"></i></button>
                            <button ${month === now.getMonth() && year === now.getFullYear() ? 'disabled class="opacity-10 px-2 py-1"' : `onclick="renderCalendar(${historyId}, ${month === 11 ? year + 1 : year}, ${month === 11 ? 0 : month + 1}, new Date('${selectedDate.toISOString()}'))" class="text-textSub px-2 py-1"`}><i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>
                    <div class="cal-grid">
                        <div class="cal-day-label">MA</div><div class="cal-day-label">TI</div><div class="cal-day-label">ON</div><div class="cal-day-label">TO</div><div class="cal-day-label">FR</div><div class="cal-day-label">LØ</div><div class="cal-day-label">SØ</div>
                        ${daysHtml}
                    </div>
                </div>`;
            overlay.addEventListener('click', closeCalendar);
            document.body.appendChild(overlay);
        }

        function selectCalendarDate(historyId, year, month, day) {
            const h = history.find(i => i.id === historyId);
            if (!h) return;
            const oldDate = new Date(h.date);
            const newDate = new Date(year, month, day, oldDate.getHours(), oldDate.getMinutes(), oldDate.getSeconds());
            h.date = newDate.toISOString();
            sync();
            closeCalendar();
        }

        function closeCalendar() {
            const overlay = document.getElementById('miniCalendarOverlay');
            if (overlay) overlay.remove();
        }

            return localStorage.getItem('kollektiv_user');
        }

        document.getElementById('userPerforming').addEventListener('change', function() {
            saveSelectedUser(this.value);
        });
    </script>
</body>
