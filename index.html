    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        input, select, textarea { font-size: 16px !important; }
        select { -webkit-appearance: none; }

            input, select, textarea { padding: 10px 12px; border-radius: 8px; }

        .swipe-item .swipe-content { position: relative; z-index: 1; background: #0A0E17; transition: transform 0.2s ease, padding-left 0.15s; }
        .swipe-item .swipe-actions { position: absolute; right: 0; top: 0; bottom: 0; display: flex; align-items: stretch; visibility: hidden; }
        .swipe-item .swipe-actions button { display: flex; align-items: center; justify-content: center; width: 72px; font-size: 12px; font-weight: bold; color: white; flex-direction: column; gap: 4px; }
        .swipe-item .swipe-actions .action-edit { background: #3B82F6; border-radius: 0; }
        .swipe-item .swipe-actions .action-delete { background: #EF4444; border-radius: 0; }
        .mini-calendar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .mini-calendar { background: #151C2C; border-radius: 20px; padding: 20px; width: 100%; max-width: 320px; border: 1px solid rgba(255,255,255,0.1); }
        .mini-calendar .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .mini-calendar .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .mini-calendar .cal-day { padding: 8px 0; border-radius: 10px; font-size: 14px; cursor: pointer; transition: background 0.15s; }
        .mini-calendar .cal-day:hover { background: rgba(255,255,255,0.1); }
        .mini-calendar .cal-day.selected { background: #7C3AED; color: white; font-weight: bold; }
        .mini-calendar .cal-day.today { outline: 2px solid #7C3AED; outline-offset: -2px; }

        .mini-calendar .cal-day.other-month { opacity: 0.3; }
        .mini-calendar .cal-day-label { font-size: 11px; color: #8D9CB1; padding: 4px 0; font-weight: bold; }
        .mini-calendar .cal-year-select { display: flex; align-items: center; gap: 6px; }
        .mini-calendar .cal-year-select button { background: none; border: none; color: #8D9CB1; cursor: pointer; padding: 2px 6px; font-size: 12px; border-radius: 6px; transition: background 0.15s, color 0.15s; }
        .mini-calendar .cal-year-select button:hover { background: rgba(255,255,255,0.1); color: white; }
        .mini-calendar .cal-year-label { font-size: 13px; color: #7C3AED; font-weight: bold; cursor: pointer; min-width: 42px; text-align: center; }
        .cal-year-dropdown { position: absolute; left: 0; top: 100%; background: #1E2538; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; max-height: 180px; overflow-y: auto; z-index: 10; min-width: 80px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .cal-year-dropdown button { display: block; width: 100%; padding: 8px 16px; background: none; border: none; color: #CBD5E1; font-size: 13px; cursor: pointer; text-align: center; transition: background 0.15s; }
        .cal-year-dropdown button:hover { background: rgba(255,255,255,0.06); }
        .cal-year-dropdown button.active-year { color: #7C3AED; font-weight: bold; background: rgba(124,58,237,0.1); }
        .swipe-item .desktop-menu-btn { display: none; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); z-index: 10; background: rgba(255,255,255,0.08); border: none; color: #8D9CB1; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; align-items: center; justify-content: center; transition: background 0.15s, color 0.15s; }

            .swipe-item:hover .desktop-menu-btn, .swipe-item .desktop-menu-btn.active { display: flex; }

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAYZBldRXfzXX_CAGBzDEoz-SduPA1g_S8",
            authDomain: "kollektivet-fc493.firebaseapp.com",
            databaseURL: "https://kollektivet-fc493-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kollektivet-fc493",
            storageBucket: "kollektivet-fc493.firebasestorage.app",
            messagingSenderId: "131176107292",
            appId: "1:131176107292:web:1a375b8560e00bba4b7ed9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let members = [], taskTypes = [], history = [], myChart, selectedTasksOnScreen = [];
        let activePeriod = 'today';
        let currentEditingId = null;

        db.ref('/').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            members = data.members || [];
            taskTypes = data.taskTypes || [];
            history = data.history || [];
            renderAll();
        });

        function sync() { db.ref('/').set({ members, taskTypes, history }); }

        const allColors = ['#F87171', '#60A5FA', '#34D399', '#FBBF24', '#A78BFA', '#F472B6', '#FB923C', '#22D3EE', '#818CF8', '#A3E635', '#E879F9', '#2DD4BF'];

        const periods = [
            { key: 'today', label: 'I dag' },
            { key: 'yesterday', label: 'I går' },
            { key: 'thisWeek', label: 'Denne uken' },
            { key: 'lastWeek', label: 'Forrige uke' },
            { key: 'thisMonth', label: 'Denne måneden' },
            { key: 'lastMonth', label: 'Forrige måned' },
            { key: 'all', label: 'Alltid' }
        ];

        function getDateRange(key) {
            const now = new Date();
            const startOfDay = d => new Date(d.getFullYear(), d.getMonth(), d.getDate());
            const today = startOfDay(now);
            switch(key) {
                case 'today': return { start: today, end: new Date(today.getTime() + 86400000) };
                case 'yesterday': { const y = new Date(today.getTime() - 86400000); return { start: y, end: today }; }
                case 'thisWeek': { const d = now.getDay(); const diff = d === 0 ? 6 : d - 1; const mon = new Date(today.getTime() - diff * 86400000); return { start: mon, end: new Date(today.getTime() + 86400000) }; }
                case 'lastWeek': { const d = now.getDay(); const diff = d === 0 ? 6 : d - 1; const thisMon = new Date(today.getTime() - diff * 86400000); return { start: new Date(thisMon.getTime() - 7 * 86400000), end: thisMon }; }
                case 'thisMonth': return { start: new Date(now.getFullYear(), now.getMonth(), 1), end: new Date(today.getTime() + 86400000) };
                case 'lastMonth': return { start: new Date(now.getFullYear(), now.getMonth() - 1, 1), end: new Date(now.getFullYear(), now.getMonth(), 1) };
                case 'all': return { start: new Date(0), end: new Date(today.getTime() + 86400000) };
            }
        }

        function filterHistory(key) {
            const { start, end } = getDateRange(key);
            return history.filter(h => { const d = new Date(h.date); return d >= start && d < end; });
        }

        function getPointsForPeriod(memberId, key) {
            return filterHistory(key).filter(h => h.userId === memberId).reduce((sum, h) => sum + h.points, 0);
        }

        function setPeriod(key) { activePeriod = key; renderAll(); }

        function renderAll() {
            renderPeriodButtons();
            renderLeaderboardAndChart();
            renderTodayHistory();
            renderAdminLists();
            const sel = document.getElementById('userPerforming');
            sel.innerHTML = '<option value="">Hvem er du?</option>' + members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
            const savedUser = localStorage.getItem('kollektiv_user');
            if (savedUser && !currentEditingId) sel.value = savedUser;
        }

        function renderPeriodButtons() {
            document.getElementById('periodButtons').innerHTML = periods.map(p => {
                const active = p.key === activePeriod;
                return `<button onclick="setPeriod('${p.key}')" class="px-3 py-1.5 rounded-full font-bold transition-all ${active ? 'bg-taskBlue text-white' : 'bg-white/5 text-textSub'}">${p.label}</button>`;
            }).join('');
        }

        function renderLeaderboardAndChart() {
            const statusEl = document.getElementById('leadStatus');
            const legendEl = document.getElementById('chartLegend');
            if (!members.length) { statusEl.innerText = "Legg til medlemmer!"; return; }
            const membersWithPoints = members.map(m => ({ ...m, periodPoints: getPointsForPeriod(m.id, activePeriod) }));
            const sorted = [...membersWithPoints].sort((a,b) => b.periodPoints - a.periodPoints);
            statusEl.innerText = sorted[0].periodPoints > 0 ? `${sorted[0].name.split(' ')[0]} leder!` : "Ingen poeng";
            legendEl.innerHTML = membersWithPoints.map(m => `<div class="flex items-center gap-2 cursor-pointer" onclick="showMemberHistory(${m.id})"><span class="w-3 h-3 rounded-full" style="background:${m.color}"></span>${m.name.split(' ')[0]}, ${m.periodPoints}p</div>`).join('');
            const ctx = document.getElementById('pointsChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: { datasets: [{ data: membersWithPoints.map(m => m.periodPoints || 1), backgroundColor: membersWithPoints.map(m => m.color), borderWidth: 0 }] },
                options: { cutout: '80%', plugins: { legend: { display: false }, tooltip: { enabled: false } } }
            });
        }

        function renderTodayHistory() {
            const hEl = document.getElementById('todayHistory');
            const log = filterHistory(activePeriod).sort((a, b) => new Date(b.date) - new Date(a.date));
            if (!log.length) { hEl.innerHTML = `<p class="text-center text-textSub text-sm py-10 opacity-50">Ingen bidrag registrert.</p>`; return; }

            const dateGroups = {};
            log.forEach(h => {
                const d = new Date(h.date).toLocaleDateString('no-NO');
                if (!dateGroups[d]) dateGroups[d] = [];
                dateGroups[d].push(h);
            });

            hEl.innerHTML = Object.keys(dateGroups).map(dateKey => {
                const itemsHtml = dateGroups[dateKey].map(h => {
                    const m = members.find(mem => mem.id === h.userId);
                    if(!m) return "";
                    return `<div class="swipe-item rounded-2xl" data-id="${h.id}" oncontextmenu="showContextMenu(event, ${h.id})">
                    <div class="swipe-actions">
                        <button class="action-edit" onclick="startEditEntry(${h.id})"><i class="fas fa-pen"></i><span>Endre bidraget</span></button>
                        <button class="action-delete" onclick="deleteEntry(${h.id})"><i class="fas fa-trash"></i><span>Slette bidraget</span></button>
                    </div>
                    <div class="swipe-content flex gap-4 items-center p-3 rounded-2xl">
                        <button class="desktop-menu-btn" onclick="event.stopPropagation(); toggleDesktopMenu(${h.id}, this)"><i class="fas fa-ellipsis-v"></i></button>
                        <span class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-xs" style="background:${m.color}">${m.name.substring(0,2).toUpperCase()}</span>
                        <div class="flex-1">
                            <p class="text-sm font-medium">${m.name.split(' ')[0]} har <span class="text-taskCyan">${h.tasks.join(', ')}</span></p>
                            <p class="text-[10px] text-textSub uppercase">+${h.points}p · ${h.tasks.length} oppgaver</p>
                        </div>
                    </div>
                </div>`;
                }).join('');
                return `<div><p class="text-xs font-bold text-textSub uppercase mb-2">${dateKey}</p><div class="space-y-2">${itemsHtml}</div></div>`;
            }).join('');
            initSwipeHandlers();
        }

        // --- Oppdatert Redigerings-logikk ---
        function startEditEntry(id) {
            closeAllSwipes();
            closeDesktopMenu();
            const h = history.find(item => item.id === id);
            if (!h) return;

            currentEditingId = id;
            document.getElementById('taskScreenTitle').innerText = "Endre bidraget";
            
            // Lås navnevelgeren og sett riktig bruker
            const sel = document.getElementById('userPerforming');
            sel.value = h.userId;
            sel.disabled = true;

            // Highlighte valgte oppgaver
            selectedTasksOnScreen = [];
            h.tasks.forEach(tName => {
                const type = taskTypes.find(tt => tt.name.toLowerCase() === tName.toLowerCase());
                if (type) selectedTasksOnScreen.push(type.id);
            });

            renderTaskBubbles();
            document.getElementById('taskSelectionScreen').classList.remove('hidden');
            document.getElementById('mainScreen').classList.add('hidden');
        }

        function showTaskSelection() { 
            currentEditingId = null;
            document.getElementById('taskScreenTitle').innerText = "Nytt bidrag";
            document.getElementById('userPerforming').disabled = false;
            selectedTasksOnScreen = [];
            renderTaskBubbles(); 
            document.getElementById('taskSelectionScreen').classList.remove('hidden'); 
            document.getElementById('mainScreen').classList.add('hidden');
        }

        function hideTaskSelection() { 
            document.getElementById('taskSelectionScreen').classList.add('hidden'); 
            document.getElementById('mainScreen').classList.remove('hidden');
        }

        function renderTaskBubbles() {
            document.getElementById('taskBubbleContainer').innerHTML = taskTypes.map(t => {
                const sel = selectedTasksOnScreen.includes(t.id);
                return `<button onclick="toggleT(${t.id})" class="px-5 py-4 rounded-2xl text-sm transition-all flex items-center gap-3 ${sel ? 'bg-taskCyan text-appBg font-bold' : 'bg-cardBg border border-white/5 text-textMain'}">
                    <i class="fas ${sel ? 'fa-check-circle' : 'fa-circle'}"></i>
                    <span>${t.name}</span>
                    <span class="text-[10px] opacity-60">${t.points}p</span>
                </button>`;
            }).join('');
        }

        function toggleT(id) {
            selectedTasksOnScreen = selectedTasksOnScreen.includes(id) ? selectedTasksOnScreen.filter(i => i !== id) : [...selectedTasksOnScreen, id];
            renderTaskBubbles();
        }

        function saveRegisteredTasks() {
            const uId = parseInt(document.getElementById('userPerforming').value);
            if(!uId || !selectedTasksOnScreen.length) return alert("Mangler navn eller oppgaver.");

            const taskNames = selectedTasksOnScreen.map(tid => taskTypes.find(tt => tt.id === tid).name.toLowerCase());
            const totalPoints = selectedTasksOnScreen.reduce((sum, tid) => sum + taskTypes.find(tt => tt.id === tid).points, 0);

            if (currentEditingId) {
                const h = history.find(item => item.id === currentEditingId);
                h.tasks = taskNames;
                h.points = totalPoints;
                // Åpner datovelgeren slik at man kan endre dato hvis ønskelig
                openDatePicker(currentEditingId);
            } else {
                history.unshift({ id: Date.now(), userId: uId, tasks: taskNames, points: totalPoints, date: new Date().toISOString() });
                sync();
            }
            hideTaskSelection();
        }

        function deleteEntry(id) {
            closeAllSwipes();
            customConfirm("Vil du slette dette bidraget?", () => {
                history = history.filter(h => h.id !== id);
                sync();
            });
        }

        // --- Originale modaler og administrasjon ---
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        function closeAllModals() { ['adminModal','memberModal','taskAdminModal'].forEach(id => document.getElementById(id).classList.add('hidden')); }

        function renderAdminLists() {
            document.getElementById('manageMembersList').innerHTML = members.map(m => `<div class="admin-swipe-item" data-admin-id="member-${m.id}" oncontextmenu="showAdminContextMenu(event, 'member', ${m.id})">
                <div class="swipe-actions">
                    <button class="action-edit" onclick="startRenameMember(${m.id})"><i class="fas fa-pen"></i><span>Endre</span></button>
                    <button class="action-delete" onclick="deleteMember(${m.id})"><i class="fas fa-trash"></i><span>Slett</span></button>
                </div>
                <div class="swipe-content flex justify-between items-center bg-appBg p-4 rounded-xl border border-white/5">
                    <span>${m.name}</span>
                    <button class="desktop-menu-btn" onclick="event.stopPropagation(); toggleAdminDesktopMenu('member', ${m.id}, this)"><i class="fas fa-ellipsis-v"></i></button>
                </div>
            </div>`).join('');
            document.getElementById('manageTasksList').innerHTML = taskTypes.map(t => `<div class="admin-swipe-item" data-admin-id="task-${t.id}" oncontextmenu="showAdminContextMenu(event, 'task', ${t.id})">
                <div class="swipe-actions">
                    <button class="action-edit" onclick="startRenameTask(${t.id})"><i class="fas fa-pen"></i><span>Endre</span></button>
                    <button class="action-delete" onclick="deleteTaskType(${t.id})"><i class="fas fa-trash"></i><span>Slett</span></button>
                </div>
                <div class="swipe-content flex justify-between items-center bg-appBg p-4 rounded-xl border border-white/5">
                    <span>${t.name} (${t.points}p)</span>
                    <button class="desktop-menu-btn" onclick="event.stopPropagation(); toggleAdminDesktopMenu('task', ${t.id}, this)"><i class="fas fa-ellipsis-v"></i></button>
                </div>
            </div>`).join('');
            initAdminSwipeHandlers();
        }

        function addMember() {
            const n = document.getElementById('newMemberName').value.trim();
            if(!n) return;
            members.push({ id: Date.now(), name: n, color: allColors[members.length % allColors.length] });
            document.getElementById('newMemberName').value = ''; sync();
        }

        function addTaskType() {
            const n = document.getElementById('newTaskName').value.trim();
            const p = parseInt(document.getElementById('newTaskPoints').value);
            if(n && p) { 
                taskTypes.push({ id: Date.now(), name: n, points: p }); 
                document.getElementById('newTaskName').value = '';
                document.getElementById('newTaskPoints').value = '';
                sync(); 
            }
        }

        // Logikk for å automatisk oppdatere poeng i historikk
        function startRenameTask(id) {
            const t = taskTypes.find(tt => tt.id === id);
            openRenameModal('Endre oppgave', t.name, (newName, newPoints) => {
                if (newPoints && newPoints !== t.points) {
                    t.points = newPoints;
                    t.name = newName;
                    // Oppdater poeng i historikken
                    history.forEach(h => {
                        let total = 0;
                        h.tasks.forEach(tn => {
                            const found = taskTypes.find(tt => tt.name.toLowerCase() === tn.toLowerCase());
                            if(found) total += found.points;
                        });
                        h.points = total;
                    });
                } else {
                    t.name = newName;
                }
                sync();
            }, true, t.points);
        }

        // --- Helper funksjoner fra originalkoden ---
        function openDatePicker(historyId) {
            const h = history.find(i => i.id === historyId);
            renderCalendar(historyId, new Date(h.date).getFullYear(), new Date(h.date).getMonth(), new Date(h.date));
        }

        function renderCalendar(historyId, year, month, selectedDate) {
            const existing = document.getElementById('miniCalendarOverlay');
            if (existing) existing.remove();
            const monthNames = ['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];
            const dayLabels = ['Ma','Ti','On','To','Fr','Lø','Sø'];
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month+1, 0);
            let startDow = firstDay.getDay();
            startDow = startDow === 0 ? 6 : startDow - 1;
            let daysHtml = dayLabels.map(d => `<div class="cal-day-label">${d}</div>`).join('');
            for(let i=0; i<startDow; i++) daysHtml += `<div class="cal-day other-month"></div>`;
            for(let d=1; d<=lastDay.getDate(); d++) {
                const isSel = (year === selectedDate.getFullYear() && month === selectedDate.getMonth() && d === selectedDate.getDate());
                daysHtml += `<div class="cal-day ${isSel ? 'selected' : ''}" onclick="selectCalendarDate(${historyId}, ${year}, ${month}, ${d})">${d}</div>`;
            }
            const overlay = document.createElement('div');
            overlay.id = 'miniCalendarOverlay';
            overlay.className = 'mini-calendar-overlay';
            overlay.innerHTML = `<div class="mini-calendar" onclick="event.stopPropagation()">
                <div class="cal-header">
                    <button onclick="renderCalendar(${historyId}, ${month===0?year-1:year}, ${month===0?11:month-1}, new Date('${selectedDate.toISOString()}'))"><i class="fas fa-chevron-left"></i></button>
                    <span class="font-bold">${monthNames[month]} ${year}</span>
                    <button onclick="renderCalendar(${historyId}, ${month===11?year+1:year}, ${month===11?0:month+1}, new Date('${selectedDate.toISOString()}'))"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="cal-grid">${daysHtml}</div>
                <button onclick="closeCalendar()" class="w-full mt-4 text-textSub text-xs">Ferdig</button>
            </div>`;
            overlay.onclick = closeCalendar;
            document.body.appendChild(overlay);
        }

        function selectCalendarDate(historyId, y, m, d) {
            const h = history.find(i => i.id === historyId);
            const old = new Date(h.date);
            h.date = new Date(y, m, d, old.getHours(), old.getMinutes()).toISOString();
            sync();
            openDatePicker(historyId);
        }

        function closeCalendar() { if(document.getElementById('miniCalendarOverlay')) document.getElementById('miniCalendarOverlay').remove(); }

        // --- Swipe og Desktop Menyer (Gjenopprettet) ---
        let currentDesktopMenu = null;
        function toggleDesktopMenu(id, btn) {
            closeDesktopMenu();
            const dropdown = document.createElement('div');
            dropdown.className = 'desktop-dropdown';
            dropdown.innerHTML = `
                <button onclick="startEditEntry(${id})"><i class="fas fa-pen"></i> Endre bidraget</button>
                <button class="delete-option" onclick="deleteEntry(${id})"><i class="fas fa-trash"></i> Slette bidraget</button>`;
            document.body.appendChild(dropdown);
            const rect = btn.getBoundingClientRect();
            dropdown.style.top = (rect.bottom + 4) + 'px';
            dropdown.style.left = (rect.right - 160) + 'px';
            currentDesktopMenu = dropdown;
        }
        function closeDesktopMenu() { if(currentDesktopMenu) { currentDesktopMenu.remove(); currentDesktopMenu = null; } }
        document.addEventListener('click', closeDesktopMenu);

        function showContextMenu(e, id) {
            e.preventDefault();
            closeDesktopMenu();
            const dropdown = document.createElement('div');
            dropdown.className = 'desktop-dropdown';
            dropdown.innerHTML = `
                <button onclick="startEditEntry(${id})"><i class="fas fa-pen"></i> Endre bidraget</button>
                <button class="delete-option" onclick="deleteEntry(${id})"><i class="fas fa-trash"></i> Slette bidraget</button>`;
            document.body.appendChild(dropdown);
            dropdown.style.top = e.clientY + 'px';
            dropdown.style.left = e.clientX + 'px';
            currentDesktopMenu = dropdown;
        }

        function initSwipeHandlers() {
            document.querySelectorAll('.swipe-item').forEach(item => {
                let startX = 0, currentX = 0, swiping = false;
                const content = item.querySelector('.swipe-content');
                item.addEventListener('touchstart', e => { startX = e.touches[0].clientX; swiping = true; content.style.transition = 'none'; });
                item.addEventListener('touchmove', e => {
                    if(!swiping) return;
                    currentX = e.touches[0].clientX;
                    let diff = currentX - startX;
                    if(diff < -144) diff = -144;
                    if(diff > 0) diff = 0;
                    content.style.transform = `translateX(${diff}px)`;
                    item.querySelector('.swipe-actions').style.visibility = 'visible';
                });
                item.addEventListener('touchend', () => {
                    swiping = false;
                    content.style.transition = 'transform 0.3s ease';
                    content.style.transform = (currentX - startX < -70) ? 'translateX(-144px)' : 'translateX(0)';
                });
            });
        }

        // Confirm & Rename Modals
        let renameCallback = null;
        function openRenameModal(title, val, cb, pts, pval) {
            renameCallback = cb;
            document.getElementById('renameModalTitle').innerText = title;
            document.getElementById('renameInput').value = val;
            const pRow = document.getElementById('renamePointsRow');
            pRow.classList.toggle('hidden', !pts);
            if(pts) document.getElementById('renamePointsInput').value = pval;
            document.getElementById('renameModal').classList.remove('hidden');
        }
        function executeRename() {
            const n = document.getElementById('renameInput').value;
            const p = parseInt(document.getElementById('renamePointsInput').value);
            renameCallback(n, p); closeRenameModal();
        }
        function closeRenameModal() { document.getElementById('renameModal').classList.add('hidden'); }

        let confirmCb = null;
        function customConfirm(msg, cb) {
            confirmCb = cb;
            document.getElementById('confirmMessage').innerText = msg;
            document.getElementById('confirmModal').classList.remove('hidden');
        }
        document.getElementById('confirmExecuteBtn').onclick = () => { confirmCb(); closeConfirm(); };
        function closeConfirm() { document.getElementById('confirmModal').classList.add('hidden'); }

        function startRenameMember(id) {
            const m = members.find(mem => mem.id === id);
            openRenameModal('Endre navn', m.name, (n) => { m.name = n; sync(); });
        }
        function deleteMember(id) { customConfirm("Slette medlem?", () => { members = members.filter(m => m.id !== id); sync(); }); }
        function deleteTaskType(id) { customConfirm("Slette oppgave?", () => { taskTypes = taskTypes.filter(t => t.id !== id); sync(); }); }
        function initAdminSwipeHandlers() { /* Samme logikk som over for admin-elementer */ }

        // Lagre bruker-valg lokalt
        document.getElementById('userPerforming').onchange = (e) => localStorage.setItem('kollektiv_user', e.target.value);
    </script>
</body>
</html>
