<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kollektivet</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kollektivet">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0A0E17">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0A0E17;
            --card-bg: #151C2C;
            --accent: #7C3AED;
            --accent-light: #9F67FF;
            --secondary: #2DD4BF;
            --text: #F8FAFC;
            --text-sub: #94A3B8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-item {
            border-left: 3px solid var(--accent);
            background: rgba(255, 255, 255, 0.02);
        }

        .modal {
            background: rgba(10, 14, 23, 0.95);
            backdrop-filter: blur(10px);
        }

        @keyframes pulse-soft {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .active-user {
            border: 2px solid var(--accent);
            animation: pulse-soft 2s infinite;
        }

        input, select {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }
        .cal-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            border-radius: 4px;
        }
    </style>
</head>
<body class="pb-24">

    <div class="max-w-md mx-auto p-5">
        <header class="flex justify-between items-center mb-8 pt-4">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-white">KOLLEKTIVET</h1>
                <p class="text-text-sub text-sm uppercase tracking-widest opacity-70">Oversikt & Poeng</p>
            </div>
            <div class="h-12 w-12 rounded-2xl btn-secondary flex items-center justify-center">
                <i class="fas fa-home text-accent text-xl"></i>
            </div>
        </header>

        <section class="card p-6 mb-6">
            <h2 id="leadStatus" class="text-xl font-bold mb-3 text-center">Laster...</h2>
            <div class="flex justify-center relative">
                <canvas id="pointsChart" style="max-height: 200px; max-width: 200px;"></canvas>
            </div>
            <div id="chartLegend" class="flex flex-wrap justify-center gap-4 mt-4 text-sm">
                </div>
        </section>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="openContributionModal()" class="btn-primary p-4 rounded-2xl flex flex-col items-center justify-center gap-2">
                <i class="fas fa-plus-circle text-2xl"></i>
                <span class="font-bold text-sm">Nytt bidrag</span>
            </button>
            <button onclick="toggleHistory()" class="btn-secondary p-4 rounded-2xl flex flex-col items-center justify-center gap-2">
                <i class="fas fa-list-ul text-2xl"></i>
                <span class="font-bold text-sm text-text-sub">Historikk</span>
            </button>
        </div>

        <section id="historySection" class="space-y-4 hidden">
            <div class="flex justify-between items-center px-1">
                <h3 class="text-lg font-bold">Siste bidrag</h3>
                <span class="text-xs text-text-sub uppercase tracking-widest">Siste 30 dager</span>
            </div>
            <div id="historyList" class="space-y-3">
                </div>
        </section>
    </div>

    <div id="contributionModal" class="modal fixed inset-0 z-50 hidden flex items-center justify-center p-6">
        <div class="bg-card-bg w-full max-w-sm rounded-3xl p-8 border border-white/10">
            <h3 class="text-2xl font-bold mb-6">Registrer bidrag</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-text-sub uppercase mb-2">Hvem utførte?</label>
                    <select id="userPerforming" class="w-full p-4 rounded-xl outline-none">
                        </select>
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-text-sub uppercase mb-2">Hva ble gjort?</label>
                    <select id="taskType" class="w-full p-4 rounded-xl outline-none">
                        <option value="oppvask">Ta oppvasken (3p)</option>
                        <option value="søppel">Gå ut med søppel (1p)</option>
                        <option value="vask_felles">Vaske fellesareal (10p)</option>
                        <option value="vask_bad">Vaske bad (8p)</option>
                        <option value="kjøp_felles">Kjøpe fellesvarer (2p)</option>
                        <option value="annet">Annet (1p)</option>
                    </select>
                </div>

                <div class="flex gap-3 pt-4">
                    <button onclick="closeContributionModal()" class="flex-1 btn-secondary p-4 rounded-xl font-bold">Avbryt</button>
                    <button onclick="submitContribution()" class="flex-1 btn-primary p-4 rounded-xl font-bold">Lagre</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAYZBldRXfzXX_CAGBzDEoz-SduPA1g_S8",
            authDomain: "kollektivet-fc493.firebaseapp.com",
            databaseURL: "https://kollektivet-fc493-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kollektivet-fc493",
            storageBucket: "kollektivet-fc493.firebasestorage.app",
            appId: "1:131176107292:web:1a375b8560e00bba4b7ed9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const users = [
            { id: 'user1', name: 'Henrik', color: '#7C3AED' },
            { id: 'user2', name: 'Aasleik', color: '#2DD4BF' },
            { id: 'user3', name: 'Sindre', color: '#F59E0B' },
            { id: 'user4', name: 'Elias', color: '#EC4899' }
        ];

        const taskPoints = {
            'oppvask': 3,
            'søppel': 1,
            'vask_felles': 10,
            'vask_bad': 8,
            'kjøp_felles': 2,
            'annet': 1
        };

        let history = [];
        let myChart = null;
        let isPlaying = false; // Hindrer dobbel spilling

        function playIntroSound(durationSeconds = 7) {
            if (isPlaying) return; // Avbryt hvis lyden allerede spiller
            
            isPlaying = true;
            const audioUrl = 'https://raw.githubusercontent.com/aasleik/Kollektivet/main/Todd%20Terje%20-%20Inspector%20Norse%20(2)-%5BAudioTrimmer.com%5D.mp3'; 
            const audio = new Audio(audioUrl);
            
            audio.volume = 0;
            audio.play().then(() => {
                // Fade inn
                let fadeIn = setInterval(() => {
                    // --- ENDRET: Maks volum er nå 0.5 i stedet for 0.9 ---
                    if (audio.volume < 0.5) audio.volume += 0.1;
                    else clearInterval(fadeIn);
                }, 100);

                // Fade ut og stopp
                // --- ENDRET: Starter fade-ut litt tidligere (etter durationSeconds * 1000 - 1500ms) ---
                setTimeout(() => {
                    let fadeOut = setInterval(() => {
                        if (audio.volume > 0.1) audio.volume -= 0.1;
                        else {
                            audio.pause();
                            audio.currentTime = 0;
                            clearInterval(fadeOut);
                            isPlaying = false; // Tillat ny spilling når ferdig
                        }
                    }, 100);
                }, durationSeconds * 1000 - 1500); 
            }).catch(e => {
                isPlaying = false; // Nullstill hvis blokkert
                console.log("Blokkert");
            });
        }

        function init() {
            const userSelect = document.getElementById('userPerforming');
            users.forEach(u => {
                const opt = document.createElement('option');
                opt.value = u.id;
                opt.textContent = u.name;
                userSelect.appendChild(opt);
            });

            const savedUser = loadSelectedUser();
            if (savedUser) userSelect.value = savedUser;

            db.ref('history').on('value', (snapshot) => {
                const data = snapshot.val();
                history = data ? Object.keys(data).map(key => ({...data[key], id: key})) : [];
                history.sort((a, b) => new Date(b.date) - new Date(a.date));
                updateUI();
            });
        }

        function updateUI() {
            const now = new Date();
            const thirtyDaysAgo = new Date(now.setDate(now.getDate() - 30));
            
            const points = {};
            users.forEach(u => points[u.id] = 0);

            history.forEach(item => {
                if (new Date(item.date) > thirtyDaysAgo) {
                    points[item.userId] = (points[item.userId] || 0) + item.points;
                }
            });

            const sortedUsers = [...users].sort((a,b) => (points[b.id] || 0) - (points[a.id] || 0));
            const leader = sortedUsers[0];
            document.getElementById('leadStatus').textContent = `${leader.name} leder! 🔥`;

            renderChart(points);
            renderHistory();
        }

        function renderChart(pointsData) {
            const ctx = document.getElementById('pointsChart').getContext('2d');
            const dataValues = users.map(u => pointsData[u.id] || 0);
            
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: users.map(u => u.name),
                    datasets: [{
                        data: dataValues,
                        backgroundColor: users.map(u => u.color),
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    cutout: '75%',
                    plugins: {
                        legend: { display: false }
                    },
                    onClick: () => {
                        playIntroSound(7);
                    }
                }
            });

            const legendContainer = document.getElementById('chartLegend');
            legendContainer.innerHTML = '';
            users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'flex items-center gap-2 bg-white/5 px-3 py-1.5 rounded-full border border-white/5';
                div.innerHTML = `
                    <div class="w-2 h-2 rounded-full" style="background: ${u.color}"></div>
                    <span class="font-bold">${pointsData[u.id] || 0}p</span>
                    <span class="text-text-sub text-xs">${u.name}</span>
                `;
                legendContainer.appendChild(div);
            });
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';

            history.slice(0, 15).forEach(item => {
                const user = users.find(u => u.id === item.userId);
                const dateStr = new Date(item.date).toLocaleDateString('no-NO', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                
                const div = document.createElement('div');
                div.className = 'history-item card p-4 flex justify-between items-center transition-all active:scale-95';
                div.onclick = () => renderCalendar(item.id, new Date(item.date).getFullYear(), new Date(item.date).getMonth(), new Date(item.date));
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-white/5 font-bold text-accent">
                            +${item.points}
                        </div>
                        <div>
                            <p class="font-bold text-white">${item.task.charAt(0).toUpperCase() + item.task.slice(1)}</p>
                            <p class="text-xs text-text-sub">${user ? user.name : 'Ukjent'} • ${dateStr}</p>
                        </div>
                    </div>
                    <i class="fas fa-calendar-alt text-text-sub opacity-30 text-sm"></i>
                `;
                list.appendChild(div);
            });
        }

        function openContributionModal() {
            document.getElementById('contributionModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeContributionModal() {
            document.getElementById('contributionModal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        function submitContribution() {
            const userId = document.getElementById('userPerforming').value;
            const task = document.getElementById('taskType').value;
            if (!userId || !task) return;
            db.ref('history').push({ userId, task, points: taskPoints[task], date: new Date().toISOString() });
            closeContributionModal();
        }

        function toggleHistory() { document.getElementById('historySection').classList.toggle('hidden'); }

        function sync() {
            history.forEach(h => {
                db.ref('history/' + h.id).update({ date: h.date });
            });
        }

        function renderCalendar(historyId, year, month, selectedDate) {
            const overlay = document.createElement('div');
            overlay.id = 'miniCalendarOverlay';
            overlay.className = 'fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm';
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const monthName = new Date(year, month).toLocaleString('no-NO', { month: 'long', year: 'numeric' });
            
            let daysHtml = '';
            const offset = firstDay === 0 ? 6 : firstDay - 1;
            for (let i = 0; i < offset; i++) daysHtml += '<div></div>';
            
            for (let i = 1; i <= daysInMonth; i++) {
                const isSelected = i === selectedDate.getDate() && month === selectedDate.getMonth() && year === selectedDate.getFullYear();
                daysHtml += `<div onclick="selectCalendarDate('${historyId}', ${year}, ${month}, ${i})" class="cal-day cursor-pointer transition-all ${isSelected ? 'bg-accent text-white font-bold' : 'hover:bg-white/10 text-text-sub'}">${i}</div>`;
            }

            overlay.innerHTML = `<div class="card p-6 w-full max-w-xs border border-white/10" onclick="event.stopPropagation()"><div class="flex justify-between items-center mb-4"><h4 class="text-sm font-bold uppercase tracking-widest text-accent">${monthName}</h4><div class="flex gap-2"><button onclick="renderCalendar('${historyId}', ${month === 0 ? year - 1 : year}, ${month === 0 ? 11 : month - 1}, new Date('${selectedDate.toISOString()}'))" class="text-text-sub px-2 py-1"><i class="fas fa-chevron-left"></i></button><button onclick="renderCalendar('${historyId}', ${month === 11 ? year + 1 : year}, ${month === 11 ? 0 : month + 1}, new Date('${selectedDate.toISOString()}'))" class="text-text-sub px-2 py-1"><i class="fas fa-chevron-right"></i></button></div></div><div class="cal-grid">${daysHtml}</div></div>`;
            overlay.onclick = closeCalendar;
            document.body.appendChild(overlay);
        }

        function selectCalendarDate(historyId, year, month, day) {
            const h = history.find(i => i.id === historyId);
            if (!h) return;
            const oldDate = new Date(h.date);
            h.date = new Date(year, month, day, oldDate.getHours(), oldDate.getMinutes(), oldDate.getSeconds()).toISOString();
            sync();
            closeCalendar();
        }

        function closeCalendar() { const o = document.getElementById('miniCalendarOverlay'); if (o) o.remove(); }
        function saveSelectedUser(userId) { if (userId) localStorage.setItem('kollektiv_user', userId); }
        function loadSelectedUser() { return localStorage.getItem('kollektiv_user'); }
        document.getElementById('userPerforming').addEventListener('change', function() { saveSelectedUser(this.value); });

        init();
    </script>
</body>
</html>
