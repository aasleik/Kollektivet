<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kollektivet</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kollektivet">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0A0E17">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        appBg: '#0A0E17',
                        cardBg: '#151C2C',
                        textMain: '#F8FAFC',
                        textSub: '#8D9CB1',
                        accent: '#7C3AED',
                        taskCyan: '#2DD4BF',
                        taskBlue: '#2563EB'
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        input, select, textarea { font-size: 16px !important; }
        button, a, [role="button"] { min-height: 44px; }
        
        .swipe-item { position: relative; overflow: hidden; }
        .swipe-content { position: relative; z-index: 1; background: #0A0E17; transition: transform 0.2s ease; }
        .swipe-actions { position: absolute; right: 0; top: 0; bottom: 0; display: flex; align-items: stretch; }
        .action-delete { background: #EF4444; color: white; width: 80px; display: flex; align-items: center; justify-content: center; flex-direction: column; font-size: 10px; font-weight: bold; gap: 4px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-appBg text-textMain min-h-screen flex flex-col overflow-x-hidden">

    <div id="mainScreen" class="flex-1 flex flex-col p-5 pb-24">
        <header class="flex justify-between items-center mb-6 pt-2">
            <h1 class="text-xl font-bold">Oversikt</h1>
            <button onclick="toggleModal('adminModal')" class="text-xl text-textSub p-2"><i class="fas fa-cog"></i></button>
        </header>

        <section class="bg-cardBg rounded-3xl p-6 mb-6 shadow-xl border border-white/5 text-center">
            <h2 id="leadStatus" class="text-lg font-bold mb-3 text-center">Laster...</h2>
            <div id="periodButtons" class="flex flex-wrap gap-2 text-[11px] justify-center mb-6"></div>
            <div class="flex justify-center mb-4">
                <canvas id="pointsChart" style="max-height: 140px; max-width: 140px;"></canvas>
            </div>
            <div id="chartLegend" class="flex flex-wrap justify-center gap-x-4 gap-y-2 text-sm font-medium text-textSub"></div>
        </section>

        <section class="flex-1">
            <h2 id="logHeading" class="text-2xl font-extrabold mb-4">I dag</h2>
            <div id="todayHistory" class="space-y-2"></div>
        </section>

        <button onclick="showTaskSelection()" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-accent text-white px-8 py-4 rounded-full font-bold shadow-2xl z-10 active:scale-95 transition-transform">
            <i class="fas fa-plus mr-2"></i> Legg til bidrag
        </button>
    </div>

    <div id="taskSelectionScreen" class="hidden fixed inset-0 bg-appBg z-50 p-5 flex flex-col overflow-y-auto">
        <header class="flex justify-between items-center mb-6">
            <button onclick="hideTaskSelection()" class="text-textMain text-sm"><i class="fas fa-chevron-left mr-1"></i> Tilbake</button>
            <h1 class="text-xl font-bold">Nytt bidrag</h1>
            <div class="w-10"></div>
        </header>

        <div class="mb-6">
            <label class="text-[10px] text-textSub uppercase font-bold ml-1 mb-2 block">Hvem er du?</label>
            <select id="userPerforming" class="w-full bg-cardBg p-4 rounded-2xl text-textMain border border-white/10 outline-none appearance-none">
                <option value="">Velg navn...</option>
            </select>
        </div>

        <h2 class="text-2xl font-extrabold mb-6">Hva har du gjort?</h2>
        <div id="taskBubbleContainer" class="flex flex-wrap gap-3 pb-32"></div>

        <button onclick="saveRegisteredTasks()" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-accent text-white px-12 py-4 rounded-full font-bold shadow-2xl z-10">
            Lagre bidrag
        </button>
    </div>

    <div id="adminModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-6" onclick="closeAllModals()">
        <div class="bg-cardBg rounded-3xl p-6 w-full max-w-sm border border-white/10" onclick="event.stopPropagation()">
            <h3 class="text-lg font-bold mb-6 text-center">Innstillinger</h3>
            <div class="space-y-3">
                <button onclick="closeAllModals(); toggleModal('memberModal')" class="w-full bg-appBg p-5 rounded-2xl flex justify-between items-center border border-white/5 font-medium"><span>Medlemmer</span><i class="fas fa-user-friends text-accent"></i></button>
                <button onclick="closeAllModals(); toggleModal('taskAdminModal')" class="w-full bg-appBg p-5 rounded-2xl flex justify-between items-center border border-white/5 font-medium"><span>Oppgaver og poeng</span><i class="fas fa-tasks text-accent"></i></button>
            </div>
            <button onclick="closeAllModals()" class="mt-8 w-full text-textSub text-sm font-bold">Lukk</button>
        </div>
    </div>

    <div id="taskAdminModal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-6" onclick="toggleModal('taskAdminModal')">
        <div class="bg-cardBg rounded-3xl p-6 w-full max-w-sm overflow-y-auto max-h-[85vh]" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold mb-4">Oppgaver</h3>
            <div class="space-y-3 mb-6 bg-appBg p-4 rounded-2xl border border-white/5">
                <input type="text" id="newTaskName" placeholder="F.eks. Vaske badet" class="w-full bg-cardBg p-3 rounded-lg border border-white/10 text-sm">
                <input type="number" id="newTaskPoints" placeholder="Poeng" class="w-full bg-cardBg p-3 rounded-lg border border-white/10 text-sm">
                <button onclick="addTaskType()" class="w-full bg-accent py-3 rounded-xl font-bold text-sm">Legg til ny</button>
            </div>
            <div id="manageTasksList" class="space-y-2"></div>
            <button onclick="toggleModal('taskAdminModal')" class="mt-8 w-full text-textSub font-bold">Tilbake</button>
        </div>
    </div>

    <div id="editTaskModal" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6" onclick="closeEditTaskModal()">
        <div class="bg-cardBg rounded-3xl p-6 w-full max-w-sm border border-white/10" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold mb-6 text-center">Rediger oppgave</h3>
            <div class="space-y-4">
                <input type="text" id="editTaskNameInput" class="w-full bg-appBg p-4 rounded-xl border border-white/10 text-sm">
                <input type="number" id="editTaskPointsInput" class="w-full bg-appBg p-4 rounded-xl border border-white/10 text-sm">
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="closeEditTaskModal()" class="flex-1 py-4 rounded-2xl bg-white/5 font-bold">Avbryt</button>
                <button onclick="saveTaskEdit()" class="flex-1 py-4 rounded-2xl bg-accent text-white font-bold">Lagre</button>
            </div>
            <button onclick="deleteTaskType()" class="w-full mt-4 text-red-500 text-xs font-bold uppercase tracking-widest">Slett oppgave</button>
        </div>
    </div>

    <div id="memberModal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-6" onclick="toggleModal('memberModal')">
        <div class="bg-cardBg rounded-3xl p-6 w-full max-w-sm" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold mb-4">Medlemmer</h3>
            <div class="flex gap-2 mb-6">
                <input type="text" id="newMemberName" placeholder="Navn..." class="flex-1 bg-appBg p-4 rounded-xl border border-white/10 text-sm">
                <button onclick="addMember()" class="bg-accent px-5 rounded-xl font-bold"><i class="fas fa-plus"></i></button>
            </div>
            <div id="manageMembersList" class="space-y-2"></div>
            <button onclick="toggleModal('memberModal')" class="mt-8 w-full text-textSub font-bold">Tilbake</button>
        </div>
    </div>

    <script>
        // FIREBASE KONFIGURASJON
        const firebaseConfig = {
            apiKey: "AIzaSyAYZBldRXfzXX_CAGBzDEoz-SduPA1g_S8",
            authDomain: "kollektivet-fc493.firebaseapp.com",
            databaseURL: "https://kollektivet-fc493-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kollektivet-fc493",
            storageBucket: "kollektivet-fc493.firebasestorage.app",
            messagingSenderId: "131176107292",
            appId: "1:131176107292:web:1a375b8560e00bba4b7ed9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let members = [], taskTypes = [], history = [], myChart, selectedTasksOnScreen = [];
        let activePeriod = 'today';
        let currentEditingTaskId = null;

        // HENT DATA
        db.ref('/').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            members = data.members || [];
            taskTypes = data.taskTypes || [];
            history = data.history || [];
            renderAll();
        });

        function sync() { db.ref('/').set({ members, taskTypes, history }); }

        // DATO-LOGIKK
        const periods = [
            { key: 'today', label: 'I dag' },
            { key: 'yesterday', label: 'I går' },
            { key: 'thisWeek', label: 'Uken' },
            { key: 'thisMonth', label: 'Måneden' },
            { key: 'all', label: 'Alltid' }
        ];

        function getFriendlyDate(dateStr) {
            const date = new Date(dateStr);
            const today = new Date();
            const yesterday = new Date();
            yesterday.setDate(today.getDate() - 1);
            if (date.toDateString() === today.toDateString()) return "I dag";
            if (date.toDateString() === yesterday.toDateString()) return "I går";
            return date.toLocaleDateString('no-NO', { weekday: 'long', day: 'numeric', month: 'long' });
        }

        function getDateRange(key) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            switch(key) {
                case 'today': return { start: today, end: new Date(today.getTime() + 86400000) };
                case 'yesterday': return { start: new Date(today.getTime() - 86400000), end: today };
                case 'thisWeek': { const d = now.getDay(); const diff = d === 0 ? 6 : d - 1; return { start: new Date(today.getTime() - diff * 86400000), end: new Date(today.getTime() + 86400000) }; }
                case 'thisMonth': return { start: new Date(now.getFullYear(), now.getMonth(), 1), end: new Date(today.getTime() + 86400000) };
                case 'all': return { start: new Date(0), end: new Date(today.getTime() + 86400000) };
            }
        }

        // RENDERING
        function renderAll() {
            renderPeriodButtons();
            renderStats();
            renderHistory();
            renderAdmin();
        }

        function renderPeriodButtons() {
            document.getElementById('periodButtons').innerHTML = periods.map(p => `
                <button onclick="activePeriod='${p.key}'; renderAll()" class="px-4 py-2 rounded-full font-bold ${activePeriod === p.key ? 'bg-taskBlue text-white' : 'bg-white/5 text-textSub'}">
                    ${p.label}
                </button>
            `).join('');
        }

        function renderStats() {
            const { start, end } = getDateRange(activePeriod);
            const filtered = history.filter(h => { const d = new Date(h.date); return d >= start && d < end; });
            
            const stats = members.map(m => ({
                name: m.name,
                color: m.color || '#7C3AED',
                points: filtered.filter(h => h.userId === m.id).reduce((s, h) => s + h.points, 0)
            })).sort((a,b) => b.points - a.points);

            document.getElementById('leadStatus').innerText = stats[0]?.points > 0 ? `${stats[0].name.split(' ')[0]} leder!` : "Ingen poeng ennå";
            document.getElementById('chartLegend').innerHTML = stats.map(s => `<div><span class="inline-block w-2 h-2 rounded-full mr-1" style="background:${s.color}"></span>${s.name.split(' ')[0]}: ${s.points}p</div>`).join('');

            const ctx = document.getElementById('pointsChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: stats.map(s => s.points || 1),
                        backgroundColor: stats.map(s => s.color),
                        borderWidth: 0
                    }]
                },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        function renderHistory() {
            const hEl = document.getElementById('todayHistory');
            const { start, end } = getDateRange(activePeriod);
            const log = history.filter(h => { const d = new Date(h.date); return d >= start && d < end; });

            if (!log.length) { hEl.innerHTML = `<p class="text-center text-textSub text-xs py-10">Tomt her...</p>`; return; }

            let html = "";
            let lastDate = "";
            log.forEach(h => {
                const m = members.find(mem => mem.id === h.userId);
                if (!m) return;
                const dateHeader = getFriendlyDate(h.date);
                if (dateHeader !== lastDate) {
                    html += `<h3 class="text-[10px] font-bold text-textSub uppercase mt-6 mb-2 ml-1 tracking-widest">${dateHeader}</h3>`;
                    lastDate = dateHeader;
                }
                html += `
                    <div class="swipe-item group" data-id="${h.id}">
                        <div class="swipe-actions"><button class="action-delete" onclick="deleteEntry(${h.id})"><i class="fas fa-trash"></i>Slett</button></div>
                        <div class="swipe-content flex items-center gap-4 p-4 bg-cardBg rounded-2xl border border-white/5 mb-2">
                            <span class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-xs" style="background:${m.color}">${m.name[0]}</span>
                            <div class="flex-1"><p class="text-sm font-medium">${m.name.split(' ')[0]} har <span class="text-taskCyan">${h.tasks.join(', ')}</span></p>
                            <p class="text-[9px] text-textSub uppercase mt-1">+${h.points} poeng</p></div>
                        </div>
                    </div>`;
            });
            hEl.innerHTML = html;
            initSwipe();
        }

        function renderAdmin() {
            document.getElementById('manageTasksList').innerHTML = taskTypes.map(t => `
                <div onclick="openEditTask(${t.id})" class="flex justify-between items-center bg-appBg p-4 rounded-xl border border-white/5 cursor-pointer">
                    <span class="text-sm font-bold">${t.name}</span>
                    <span class="text-xs text-textSub">${t.points}p <i class="fas fa-pen ml-2 opacity-30"></i></span>
                </div>
            `).join('');

            document.getElementById('manageMembersList').innerHTML = members.map(m => `
                <div class="flex justify-between items-center bg-appBg p-4 rounded-xl border border-white/5">
                    <span class="text-sm font-bold">${m.name}</span>
                    <button onclick="deleteMember(${m.id})" class="text-red-500 opacity-50"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');

            document.getElementById('userPerforming').innerHTML = '<option value="">Hvem er du?</option>' + members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
        }

        // LOGIKK FOR BIDRAG
        function showTaskSelection() {
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('taskSelectionScreen').classList.remove('hidden');
            selectedTasksOnScreen = [];
            renderTaskBubbles();
        }

        function hideTaskSelection() {
            document.getElementById('mainScreen').classList.remove('hidden');
            document.getElementById('taskSelectionScreen').classList.add('hidden');
        }

        function renderTaskBubbles() {
            document.getElementById('taskBubbleContainer').innerHTML = taskTypes.map(t => {
                const sel = selectedTasksOnScreen.includes(t.id);
                return `<button onclick="toggleT(${t.id})" class="px-5 py-4 rounded-2xl text-sm border ${sel ? 'bg-taskCyan text-appBg border-taskCyan font-bold' : 'bg-cardBg border-white/5 text-textMain'}">
                    ${t.name} (${t.points}p)
                </button>`;
            }).join('');
        }

        function toggleT(id) {
            selectedTasksOnScreen = selectedTasksOnScreen.includes(id) ? selectedTasksOnScreen.filter(i => i !== id) : [...selectedTasksOnScreen, id];
            renderTaskBubbles();
        }

        function saveRegisteredTasks() {
            const uId = parseInt(document.getElementById('userPerforming').value);
            if(!uId || !selectedTasksOnScreen.length) return alert("Velg navn og oppgaver!");
            
            const taskNames = selectedTasksOnScreen.map(tid => taskTypes.find(tt => tt.id === tid).name.toLowerCase());
            const totalPoints = selectedTasksOnScreen.reduce((s, tid) => s + taskTypes.find(tt => tt.id === tid).points, 0);
            
            history.unshift({ id: Date.now(), userId: uId, tasks: taskNames, points: totalPoints, date: new Date().toISOString() });
            sync(); hideTaskSelection();
        }

        // REDIGERING AV OPPGAVER
        function openEditTask(id) {
            currentEditingTaskId = id;
            const t = taskTypes.find(x => x.id === id);
            document.getElementById('editTaskNameInput').value = t.name;
            document.getElementById('editTaskPointsInput').value = t.points;
            document.getElementById('editTaskModal').classList.remove('hidden');
        }

        function closeEditTaskModal() { document.getElementById('editTaskModal').classList.add('hidden'); }

        function saveTaskEdit() {
            const t = taskTypes.find(x => x.id === currentEditingTaskId);
            t.name = document.getElementById('editTaskNameInput').value;
            t.points = parseInt(document.getElementById('editTaskPointsInput').value);
            sync(); closeEditTaskModal();
        }

        function deleteTaskType() {
            if(!confirm("Slette denne oppgavetypen helt?")) return;
            taskTypes = taskTypes.filter(t => t.id !== currentEditingTaskId);
            sync(); closeEditTaskModal();
        }

        // ADMIN HANDLINGER
        function addMember() {
            const name = document.getElementById('newMemberName').value;
            if(!name) return;
            const colors = ['#EF4444', '#3B82F6', '#10B981', '#F59E0B', '#7C3AED'];
            members.push({ id: Date.now(), name, points: 0, color: colors[members.length % colors.length] });
            document.getElementById('newMemberName').value = "";
            sync();
        }

        function deleteMember(id) { if(confirm("Slette medlem?")) { members = members.filter(m => m.id !== id); sync(); } }

        function addTaskType() {
            const name = document.getElementById('newTaskName').value;
            const points = parseInt(document.getElementById('newTaskPoints').value);
            if(!name || !points) return;
            taskTypes.push({ id: Date.now(), name, points });
            document.getElementById('newTaskName').value = "";
            document.getElementById('newTaskPoints').value = "";
            sync();
        }

        function deleteEntry(id) { history = history.filter(h => h.id !== id); sync(); }

        // MODALER
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        function closeAllModals() { document.querySelectorAll('[id$="Modal"]').forEach(m => m.classList.add('hidden')); }

        // ENKEL SWIPE LOGIKK
        function initSwipe() {
            document.querySelectorAll('.swipe-item').forEach(item => {
                let startX;
                const content = item.querySelector('.swipe-content');
                item.addEventListener('touchstart', e => startX = e.touches[0].clientX);
                item.addEventListener('touchmove', e => {
                    let diff = startX - e.touches[0].clientX;
                    if (diff > 0 && diff < 100) content.style.transform = `translateX(-${diff}px)`;
                });
                item.addEventListener('touchend', e => {
                    let diff = startX - e.changedTouches[0].clientX;
                    content.style.transform = diff > 50 ? `translateX(-80px)` : `translateX(0)`;
                });
            });
        }
    </script>
</body>
</html>
