<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kollektivet</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kollektivet">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0A0E17">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        appBg: '#0A0E17',
                        cardBg: '#151C2C',
                        textMain: '#F8FAFC',
                        textSub: '#8D9CB1',
                        accent: '#7C3AED',
                        taskCyan: '#2DD4BF',
                        taskBlue: '#2563EB'
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        input, select, textarea { font-size: 16px !important; }
        select { -webkit-appearance: none; }
        button, a, [role="button"], .swipe-item, .admin-swipe-item { min-height: 44px; }
        @media (max-width: 640px) {
            input, select, textarea { padding: 10px 12px; border-radius: 8px; }
        }
        .swipe-item { position: relative; overflow: hidden; }
        .swipe-item .swipe-content { position: relative; z-index: 1; background: #0A0E17; transition: transform 0.2s ease, padding-left 0.15s; }
        .swipe-item .swipe-actions { position: absolute; right: 0; top: 0; bottom: 0; display: flex; align-items: stretch; visibility: hidden; }
        .swipe-item .swipe-actions button { display: flex; align-items: center; justify-content: center; width: 72px; font-size: 12px; font-weight: bold; color: white; flex-direction: column; gap: 4px; }
        .swipe-item .swipe-actions .action-edit { background: #3B82F6; border-radius: 0; }
        .swipe-item .swipe-actions .action-delete { background: #EF4444; border-radius: 0; }
        
        .mini-calendar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .mini-calendar { background: #151C2C; border-radius: 20px; padding: 20px; width: 100%; max-width: 320px; border: 1px solid rgba(255,255,255,0.1); }
        .mini-calendar .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .mini-calendar .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .mini-calendar .cal-day { padding: 8px 0; border-radius: 10px; font-size: 14px; cursor: pointer; transition: background 0.15s; }
        .mini-calendar .cal-day:hover { background: rgba(255,255,255,0.1); }
        .mini-calendar .cal-day.selected { background: #7C3AED; color: white; font-weight: bold; }
        .mini-calendar .cal-day.today { outline: 2px solid #7C3AED; outline-offset: -2px; }
        .mini-calendar .cal-day.future { opacity: 0.25; cursor: not-allowed; pointer-events: none; }
        .mini-calendar .cal-day.other-month { opacity: 0.3; }
        .mini-calendar .cal-day-label { font-size: 11px; color: #8D9CB1; padding: 4px 0; font-weight: bold; }
        
        .swipe-item .desktop-menu-btn { display: none; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); z-index: 10; background: rgba(255,255,255,0.08); border: none; color: #8D9CB1; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; align-items: center; justify-content: center; transition: background 0.15s, color 0.15s; }
        @media (hover: hover) and (pointer: fine) {
            .swipe-item:hover .desktop-menu-btn, .swipe-item .desktop-menu-btn.active { display: flex; }
            .swipe-item:hover .swipe-content { padding-right: 48px; }
        }
        .desktop-dropdown { position: fixed; z-index: 9999; background: #1E2538; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.5); min-width: 160px; }
        .desktop-dropdown button { display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px 16px; background: none; border: none; color: #CBD5E1; font-size: 13px; font-weight: 500; cursor: pointer; text-align: left; transition: background 0.15s; }
        .desktop-dropdown button:hover { background: rgba(255,255,255,0.06); }
        .desktop-dropdown button.delete-option { color: #F87171; }
    </style>
</head>
<body class="bg-appBg text-textMain min-h-screen flex flex-col overflow-x-hidden">

    <div id="mainScreen" class="flex-1 flex flex-col p-5 pb-24">
        <header class="flex justify-between items-center mb-6 pt-2">
            <h1 class="text-xl font-bold">Oversikt</h1>
            <button onclick="toggleModal('adminModal')" class="text-xl text-textSub p-2"><i class="fas fa-cog"></i></button>
        </header>

        <section class="bg-cardBg rounded-3xl p-4 sm:p-6 mb-6 shadow-xl border border-white/5">
            <h2 id="leadStatus" class="text-lg sm:text-xl font-bold mb-3 text-center">Laster data...</h2>
            <div id="periodButtons" class="flex flex-wrap gap-2 text-[11px] text-textSub justify-center mb-4"></div>
            <div class="flex justify-center">
                <canvas id="pointsChart" style="max-height: 140px; max-width: 140px;"></canvas>
            </div>
            <div id="chartLegend" class="flex flex-wrap justify-center gap-x-4 gap-y-1 text-sm sm:text-base font-medium mt-4 text-textSub"></div>
        </section>

        <section class="flex-1 space-y-6">
            <h2 id="logHeading" class="text-2xl sm:text-3xl font-extrabold">I dag</h2>
            <div id="todayHistory" class="space-y-6"></div>
        </section>

        <button onclick="showTaskSelection()" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-accent text-white px-8 py-4 rounded-full font-bold shadow-2xl shadow-accent/40 text-lg flex items-center gap-2.5 z-10 active:scale-95 transition-transform">
            <i class="fas fa-plus text-sm"></i> Legg til bidrag
        </button>
    </div>

    <div id="taskSelectionScreen" class="hidden fixed inset-0 bg-appBg z-50 p-5 flex flex-col overflow-y-auto">
        <header class="flex justify-between items-center mb-6">
            <button onclick="hideTaskSelection()" class="text-textMain text-sm flex items-center gap-1.5"><i class="fas fa-chevron-left"></i> Tilbake</button>
            <h1 id="taskScreenTitle" class="text-xl font-bold">Nytt bidrag</h1>
            <div></div>
        </header>

        <div class="space-y-4 mb-6">
            <div class="relative">
                <label class="text-xs text-textSub mb-2 block ml-1 uppercase font-bold">Hvem er du?</label>
                <select id="userPerforming" class="w-full bg-cardBg p-4 rounded-2xl text-textMain outline-none border border-white/10 appearance-none shadow-inner disabled:opacity-50">
                    <option value="">Velg navn...</option>
                </select>
                <i class="fas fa-chevron-down absolute right-4 bottom-5 text-textSub pointer-events-none"></i>
            </div>

            <div class="relative">
                <label class="text-xs text-textSub mb-2 block ml-1 uppercase font-bold">Dato for bidrag</label>
                <button id="dateDisplayBtn" onclick="openDatePickerForEntry()" class="w-full bg-cardBg p-4 rounded-2xl text-left border border-white/10 flex justify-between items-center">
                    <span id="selectedDateText">I dag</span>
                    <i class="fas fa-calendar-alt text-accent"></i>
                </button>
            </div>
        </div>

        <h2 class="text-2xl font-extrabold mb-6 leading-tight">Hva har du gjort?</h2>
        
        <div id="taskBubbleContainer" class="flex flex-wrap gap-3 pb-32"></div>

        <button onclick="saveRegisteredTasks()" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-accent text-white px-12 py-4 rounded-full font-bold shadow-2xl z-10 active:scale-95 transition-transform">
            Lagre
        </button>
    </div>

    <div id="adminModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-6" onclick="closeAllModals()">
        <div class="bg-cardBg rounded-3xl p-6 w-full max-w-sm border border-white/10" onclick="event.stopPropagation()">
            <h3 class="text-lg font-bold mb-6 text-center">Innstillinger</h3>
            <div class="space-y-3">
                <button onclick="closeAllModals(); toggleModal('memberModal')" class="w-full bg-appBg p-5 rounded-2xl flex justify-between items-center border border-white/5 font-medium"><span>Medlemmer</span><i class="fas fa-user-friends text-accent"></i></button>
                <button onclick="closeAllModals(); toggleModal('taskAdminModal')" class="w-full bg-appBg p-5 rounded-2xl flex justify-between items-center border border-white/5 font-medium"><span>Oppgaver</span><i class="fas fa-tasks text-accent"></i></button>
            </div>
            <button onclick="toggleModal('adminModal')" class="mt-8 w-full text-textSub text-sm font-bold">Lukk</button>
        </div>
    </div>

    <div id="memberModal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-6" onclick="toggleModal('memberModal')">
        <div class="bg-cardBg rounded-3xl p-6 w-full max-w-sm" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold mb-4">Medlemmer</h3>
            <div class="flex gap-2 mb-6">
                <input type="text" id="newMemberName" placeholder="Navn..." class="flex-1 bg-appBg p-4 rounded-xl border border-white/10 text-sm">
                <button onclick="addMember()" class="bg-accent px-5 rounded-xl"><i class="fas fa-plus"></i></button>
            </div>
            <div id="manageMembersList" class="space-y-2 max-h-60 overflow-y-auto"></div>
            <button onclick="toggleModal('memberModal')" class="mt-8 w-full text-textSub font-bold">Tilbake</button>
        </div>
    </div>

    <div id="taskAdminModal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-6" onclick="toggleModal('taskAdminModal')">
        <div class="bg-cardBg rounded-3xl p-6 w-full max-w-sm overflow-y-auto max-h-[85vh]" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold mb-4">Oppgaver</h3>
            <div class="space-y-3 mb-6 bg-appBg p-4 rounded-2xl border border-white/5">
                <input type="text" id="newTaskName" placeholder="F.eks. Støvsuge" class="w-full bg-cardBg p-3 rounded-lg border border-white/10 text-sm">
                <input type="number" id="newTaskPoints" placeholder="Poeng" class="w-full bg-cardBg p-3 rounded-lg border border-white/10 text-sm">
                <button onclick="addTaskType()" class="w-full bg-accent py-3 rounded-xl font-bold">Legg til</button>
            </div>
            <div id="manageTasksList" class="space-y-2"></div>
            <button onclick="toggleModal('taskAdminModal')" class="mt-8 w-full text-textSub font-bold">Tilbake</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAYZBldRXfzXX_CAGBzDEoz-SduPA1g_S8",
            authDomain: "kollektivet-fc493.firebaseapp.com",
            databaseURL: "https://kollektivet-fc493-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kollektivet-fc493",
            storageBucket: "kollektivet-fc493.firebasestorage.app",
            messagingSenderId: "131176107292",
            appId: "1:131176107292:web:1a375b8560e00bba4b7ed9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let members = [], taskTypes = [], history = [], myChart, selectedTasksOnScreen = [];
        let activePeriod = 'today';
        let editingHistoryId = null;
        let selectedDateForEntry = new Date();

        db.ref('/').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            members = data.members || [];
            taskTypes = data.taskTypes || [];
            history = data.history || [];
            renderAll();
        });

        function sync() { db.ref('/').set({ members, taskTypes, history }); }

        function renderAll() {
            renderPeriodButtons();
            renderLeaderboardAndChart();
            renderTodayHistory();
            renderAdminLists();
            const sel = document.getElementById('userPerforming');
            sel.innerHTML = '<option value="">Hvem er du?</option>' + members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
        }

        function renderPeriodButtons() {
            const periods = [
                { key: 'today', label: 'I dag' },
                { key: 'thisWeek', label: 'Uken' },
                { key: 'thisMonth', label: 'Måned' },
                { key: 'all', label: 'Alltid' }
            ];
            document.getElementById('periodButtons').innerHTML = periods.map(p => {
                const active = p.key === activePeriod;
                return `<button onclick="setPeriod('${p.key}')" class="px-3 py-1.5 rounded-full font-bold ${active ? 'bg-taskBlue text-white' : 'bg-white/5 text-textSub'}">${p.label}</button>`;
            }).join('');
        }

        function setPeriod(key) { activePeriod = key; renderAll(); }

        function filterHistory(key) {
            const now = new Date();
            const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            if (key === 'today') return history.filter(h => new Date(h.date) >= startOfDay);
            if (key === 'thisWeek') {
                const d = now.getDay();
                const diff = d === 0 ? 6 : d - 1;
                const mon = new Date(startOfDay.getTime() - diff * 86400000);
                return history.filter(h => new Date(h.date) >= mon);
            }
            if (key === 'thisMonth') return history.filter(h => new Date(h.date) >= new Date(now.getFullYear(), now.getMonth(), 1));
            return history;
        }

        function renderLeaderboardAndChart() {
            const statusEl = document.getElementById('leadStatus');
            const legendEl = document.getElementById('chartLegend');
            if (!members.length) { statusEl.innerText = "Legg til medlemmer!"; return; }

            const membersWithPoints = members.map(m => {
                const p = filterHistory(activePeriod).filter(h => h.userId === m.id).reduce((sum, h) => sum + h.points, 0);
                return { ...m, periodPoints: p };
            }).sort((a,b) => b.periodPoints - a.periodPoints);

            statusEl.innerText = membersWithPoints[0].periodPoints > 0 ? `${membersWithPoints[0].name.split(' ')[0]} leder!` : "Ingen poeng";
            legendEl.innerHTML = membersWithPoints.map(m => `<div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full" style="background:${m.color}"></span>${m.name.split(' ')[0]}, ${m.periodPoints}p</div>`).join('');

            const ctx = document.getElementById('pointsChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: membersWithPoints.map(m => m.periodPoints || 0.1),
                        backgroundColor: membersWithPoints.map(m => m.color),
                        borderWidth: 0
                    }]
                },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        function renderTodayHistory() {
            const hEl = document.getElementById('todayHistory');
            const log = filterHistory(activePeriod).sort((a, b) => new Date(b.date) - new Date(a.date));
            
            if (!log.length) { hEl.innerHTML = `<p class="text-center text-textSub text-sm opacity-50">Ingen bidrag her.</p>`; return; }

            hEl.innerHTML = log.map(h => {
                const m = members.find(mem => mem.id === h.userId);
                if(!m) return "";
                return `<div class="swipe-item rounded-2xl" data-id="${h.id}">
                    <div class="swipe-actions">
                        <button class="action-edit" onclick="editContribution(${h.id})"><i class="fas fa-pen"></i><span>Endre</span></button>
                        <button class="action-delete" onclick="deleteContribution(${h.id})"><i class="fas fa-trash"></i><span>Slett</span></button>
                    </div>
                    <div class="swipe-content flex gap-4 items-center p-3 rounded-2xl">
                        <span class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-xs" style="background:${m.color}">${m.name.substring(0,2).toUpperCase()}</span>
                        <div class="flex-1">
                            <p class="text-sm font-medium">${m.name.split(' ')[0]}: <span class="text-taskCyan">${h.tasks.join(', ')}</span></p>
                            <p class="text-[10px] text-textSub uppercase">+${h.points}p · ${new Date(h.date).toLocaleDateString('no-NO')}</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
            initSwipeHandlers();
        }

        function showTaskSelection() { 
            editingHistoryId = null;
            selectedTasksOnScreen = [];
            selectedDateForEntry = new Date();
            document.getElementById('taskScreenTitle').innerText = "Nytt bidrag";
            document.getElementById('userPerforming').disabled = false;
            updateDateDisplay();
            renderTaskBubbles();
            document.getElementById('taskSelectionScreen').classList.remove('hidden'); 
            document.getElementById('mainScreen').classList.add('hidden');
        }

        function editContribution(id) {
            const h = history.find(item => item.id === id);
            if (!h) return;
            
            editingHistoryId = id;
            selectedDateForEntry = new Date(h.date);
            document.getElementById('taskScreenTitle').innerText = "Endre bidrag";
            
            // Lås navnevelgeren til personen som eier bidraget
            const userSelect = document.getElementById('userPerforming');
            userSelect.value = h.userId;
            userSelect.disabled = true;

            // Finn ID-ene til oppgavene basert på navn (siden historikken lagrer navn)
            selectedTasksOnScreen = [];
            h.tasks.forEach(taskName => {
                const found = taskTypes.find(t => t.name.toLowerCase() === taskName.toLowerCase());
                if (found) selectedTasksOnScreen.push(found.id);
            });

            updateDateDisplay();
            renderTaskBubbles();
            document.getElementById('taskSelectionScreen').classList.remove('hidden');
            document.getElementById('mainScreen').classList.add('hidden');
        }

        function hideTaskSelection() { 
            document.getElementById('taskSelectionScreen').classList.add('hidden'); 
            document.getElementById('mainScreen').classList.remove('hidden');
        }

        function renderTaskBubbles() {
            document.getElementById('taskBubbleContainer').innerHTML = taskTypes.map(t => {
                const sel = selectedTasksOnScreen.includes(t.id);
                return `<button onclick="toggleT(${t.id})" class="px-5 py-4 rounded-2xl text-sm flex items-center gap-3 ${sel ? 'bg-taskCyan text-appBg font-bold' : 'bg-cardBg border border-white/5 text-textMain'}">
                    <i class="fas ${sel ? 'fa-check-circle' : 'fa-circle'}"></i>
                    <span>${t.name}</span>
                    <span class="text-[10px] opacity-60">${t.points}p</span>
                </button>`;
            }).join('');
        }

        function toggleT(id) {
            selectedTasksOnScreen = selectedTasksOnScreen.includes(id) ? selectedTasksOnScreen.filter(i => i !== id) : [...selectedTasksOnScreen, id];
            renderTaskBubbles();
        }

        function saveRegisteredTasks() {
            const uId = parseInt(document.getElementById('userPerforming').value);
            if(!uId || !selectedTasksOnScreen.length) return alert("Velg navn og oppgaver!");

            const taskNames = selectedTasksOnScreen.map(tid => taskTypes.find(tt => tt.id === tid).name.toLowerCase());
            const totalPoints = selectedTasksOnScreen.reduce((sum, tid) => sum + taskTypes.find(tt => tt.id === tid).points, 0);

            if (editingHistoryId) {
                const idx = history.findIndex(h => h.id === editingHistoryId);
                history[idx].tasks = taskNames;
                history[idx].points = totalPoints;
                history[idx].date = selectedDateForEntry.toISOString();
            } else {
                history.unshift({ id: Date.now(), userId: uId, tasks: taskNames, points: totalPoints, date: selectedDateForEntry.toISOString() });
            }
            
            sync(); hideTaskSelection();
        }

        function deleteContribution(id) {
            if(confirm("Slette dette bidraget?")) {
                history = history.filter(h => h.id !== id);
                sync();
            }
        }

        // --- Kalender-logikk ---
        function updateDateDisplay() {
            const d = selectedDateForEntry;
            const today = new Date();
            const text = d.toDateString() === today.toDateString() ? "I dag" : d.toLocaleDateString('no-NO', { day: 'numeric', month: 'long' });
            document.getElementById('selectedDateText').innerText = text;
        }

        function openDatePickerForEntry() {
            renderCalendarPopup(selectedDateForEntry.getFullYear(), selectedDateForEntry.getMonth());
        }

        function renderCalendarPopup(year, month) {
            const existing = document.getElementById('calOverlay');
            if (existing) existing.remove();

            const overlay = document.createElement('div');
            overlay.id = 'calOverlay';
            overlay.className = 'mini-calendar-overlay';
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            let startDow = firstDay.getDay();
            startDow = startDow === 0 ? 6 : startDow - 1;

            let daysHtml = '';
            for (let i = 0; i < startDow; i++) daysHtml += `<div></div>`;
            for (let d = 1; d <= lastDay.getDate(); d++) {
                const isSel = d === selectedDateForEntry.getDate() && month === selectedDateForEntry.getMonth() && year === selectedDateForEntry.getFullYear();
                daysHtml += `<div onclick="setEntryDate(${year}, ${month}, ${d})" class="cal-day ${isSel ? 'selected' : ''}">${d}</div>`;
            }

            overlay.innerHTML = `
                <div class="mini-calendar">
                    <div class="cal-header">
                        <button onclick="renderCalendarPopup(${month === 0 ? year-1 : year}, ${month === 0 ? 11 : month-1})"><i class="fas fa-chevron-left"></i></button>
                        <span class="font-bold">${new Date(year, month).toLocaleString('no-NO', {month:'long', year:'numeric'})}</span>
                        <button onclick="renderCalendarPopup(${month === 11 ? year+1 : year}, ${month === 11 ? 0 : month+1})"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div class="cal-grid" style="grid-template-columns: repeat(7, 1fr)">${daysHtml}</div>
                    <button onclick="this.closest('.mini-calendar-overlay').remove()" class="w-full mt-4 text-textSub text-xs">Lukk</button>
                </div>`;
            document.body.appendChild(overlay);
        }

        function setEntryDate(y, m, d) {
            selectedDateForEntry = new Date(y, m, d, 12, 0, 0);
            updateDateDisplay();
            document.getElementById('calOverlay').remove();
        }

        // Swipe & Modal Helpers
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        function closeAllModals() { ['adminModal','memberModal','taskAdminModal'].forEach(id => document.getElementById(id).classList.add('hidden')); }
        
        function initSwipeHandlers() {
            document.querySelectorAll('.swipe-item').forEach(item => {
                let startX = 0, currentX = 0;
                const content = item.querySelector('.swipe-content');
                item.addEventListener('touchstart', e => { startX = e.touches[0].clientX; content.style.transition = 'none'; });
                item.addEventListener('touchmove', e => {
                    currentX = e.touches[0].clientX;
                    let diff = currentX - startX;
                    if (diff < -144) diff = -144;
                    if (diff > 0) diff = 0;
                    content.style.transform = `translateX(${diff}px)`;
                    item.querySelector('.swipe-actions').style.visibility = 'visible';
                });
                item.addEventListener('touchend', () => {
                    content.style.transition = 'transform 0.3s ease';
                    content.style.transform = (currentX - startX < -70) ? 'translateX(-144px)' : 'translateX(0)';
                });
            });
        }

        function renderAdminLists() {
            document.getElementById('manageMembersList').innerHTML = members.map(m => `<div class="p-3 bg-appBg rounded-xl border border-white/5 flex justify-between"><span>${m.name}</span><button onclick="deleteMember(${m.id})" class="text-red-500"><i class="fas fa-trash"></i></button></div>`).join('');
            document.getElementById('manageTasksList').innerHTML = taskTypes.map(t => `<div class="p-3 bg-appBg rounded-xl border border-white/5 flex justify-between"><span>${t.name} (${t.points}p)</span><button onclick="deleteTaskType(${t.id})" class="text-red-500"><i class="fas fa-trash"></i></button></div>`).join('');
        }

        function addMember() {
            const n = document.getElementById('newMemberName').value;
            if(n) { members.push({id: Date.now(), name: n, color: '#'+Math.floor(Math.random()*16777215).toString(16)}); sync(); }
        }
        function addTaskType() {
            const n = document.getElementById('newTaskName').value;
            const p = parseInt(document.getElementById('newTaskPoints').value);
            if(n && p) { taskTypes.push({id: Date.now(), name: n, points: p}); sync(); }
        }
        function deleteMember(id) { members = members.filter(m => m.id !== id); sync(); }
        function deleteTaskType(id) { taskTypes = taskTypes.filter(t => t.id !== id); sync(); }
    </script>
</body>
</html>
