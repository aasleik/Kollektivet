<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kollektivet Pro</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kollektivet">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0A0E17">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0A0E17;
            --card-bg: #161B22;
            --accent-blue: #58A6FF;
            --accent-green: #238636;
            --text-main: #E6EDF3;
            --text-sub: #8B949E;
            --danger: #F85149;
        }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background-color: var(--card-bg); border: 1px solid #30363D; border-radius: 12px; }
        .btn-primary { background-color: var(--accent-green); color: white; padding: 12px 24px; border-radius: 8px; font-weight: 600; transition: opacity 0.2s; }
        .btn-primary:active { opacity: 0.8; }
        .hidden { display: none; }
        .swipe-container { position: relative; overflow: hidden; touch-action: pan-y; }
        .swipe-content { transition: transform 0.3s ease-out; position: relative; z-index: 2; background: var(--card-bg); }
        .swipe-actions { position: absolute; right: 0; top: 0; bottom: 0; display: flex; z-index: 1; }
        .action-btn { display: flex; align-items: center; justify-content: center; width: 70px; color: white; }
    </style>
</head>
<body class="pb-20">

    <div id="setupScreen" class="fixed inset-0 z-50 bg-[#0A0E17] flex flex-col items-center justify-center p-6 hidden">
        <div class="w-full max-w-md space-y-6 text-center">
            <h1 class="text-4xl font-bold text-accent-blue mb-2">Kollektivet</h1>
            <p class="text-textSub mb-8">Skriv inn bofellesskapets nøkkel</p>
            <input type="text" id="dbKeyInput" placeholder="Nøkkel" class="w-full bg-[#161B22] border border-[#30363D] rounded-lg p-4 text-white focus:outline-none focus:border-accent-blue">
            <button onclick="initApp()" class="w-full btn-primary">Bli med</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#161B22] border-t border-[#30363D] z-40 px-4 flex justify-around">
        <button onclick="showTab('tasks')" id="nav-tasks" class="py-4 px-2 flex flex-col items-center space-y-1 text-accent-blue">
            <i class="fas fa-list-check text-xl"></i>
            <span class="text-[10px] font-medium">Oppgaver</span>
        </button>
        <button onclick="showTab('stats')" id="nav-stats" class="py-4 px-2 flex flex-col items-center space-y-1 text-textSub">
            <i class="fas fa-chart-simple text-xl"></i>
            <span class="text-[10px] font-medium">Stats</span>
        </button>
        <button onclick="showTab('history')" id="nav-history" class="py-4 px-2 flex flex-col items-center space-y-1 text-textSub">
            <i class="fas fa-clock-rotate-left text-xl"></i>
            <span class="text-[10px] font-medium">Logg</span>
        </button>
        <button onclick="showTab('admin')" id="nav-admin" class="py-4 px-2 flex flex-col items-center space-y-1 text-textSub">
            <i class="fas fa-gear text-xl"></i>
            <span class="text-[10px] font-medium">Admin</span>
        </button>
    </nav>

    <header class="p-4 flex justify-between items-center bg-[#0A0E17] sticky top-0 z-30">
        <h1 class="text-xl font-bold" id="tabTitle">Oppgaver</h1>
        <div id="activeUserDisplay" class="text-xs text-textSub bg-[#161B22] px-3 py-1.5 rounded-full border border-[#30363D]"></div>
    </header>

    <main class="p-4">
        <div id="tab-tasks" class="space-y-6">
            <div class="card p-4">
                <label class="block text-xs font-semibold text-textSub uppercase tracking-wider mb-2">Hvem utfører?</label>
                <select id="userPerforming" class="w-full bg-[#0A0E17] border border-[#30363D] rounded-lg p-3 text-white focus:outline-none"></select>
            </div>
            <div id="taskList" class="grid grid-cols-2 gap-3"></div>
            <div id="selectionSummary" class="fixed bottom-24 left-4 right-4 bg-accent-blue text-white rounded-xl p-4 shadow-2xl flex justify-between items-center hidden">
                <div>
                    <p id="summaryText" class="font-bold"></p>
                    <p id="summaryPoints" class="text-xs opacity-90"></p>
                </div>
                <button onclick="saveRegisteredTasks()" class="bg-white text-accent-blue px-6 py-2 rounded-lg font-bold">Lagre</button>
            </div>
        </div>

        <div id="tab-stats" class="hidden space-y-6">
            <div class="card p-4"><canvas id="leaderboardChart" class="w-full"></canvas></div>
            <div id="memberStats" class="space-y-3"></div>
        </div>

        <div id="tab-history" class="hidden">
            <div id="historyList" class="space-y-4"></div>
            <p id="historyLimitText" class="text-center text-[10px] text-textSub mt-6 hidden">Viser kun de siste 50 bidragene</p>
        </div>

        <div id="tab-admin" class="hidden space-y-8">
            <section>
                <h3 class="text-textSub text-xs font-bold uppercase tracking-widest mb-4">Medlemmer</h3>
                <div id="adminMemberList" class="space-y-2 mb-4"></div>
                <div class="flex gap-2">
                    <input type="text" id="newMemberName" placeholder="Navn" class="flex-1 bg-card-bg border border-[#30363D] rounded-lg px-4 py-2 text-sm">
                    <button onclick="addMember()" class="bg-accent-blue text-white px-4 py-2 rounded-lg"><i class="fas fa-plus"></i></button>
                </div>
            </section>
            <section>
                <h3 class="text-textSub text-xs font-bold uppercase tracking-widest mb-4">Oppgavetyper</h3>
                <div id="adminTaskList" class="space-y-2 mb-4"></div>
                <div class="space-y-2">
                    <input type="text" id="newTaskName" placeholder="Oppgave" class="w-full bg-card-bg border border-[#30363D] rounded-lg px-4 py-2 text-sm">
                    <div class="flex gap-2">
                        <input type="number" id="newTaskPoints" placeholder="Poeng" class="flex-1 bg-card-bg border border-[#30363D] rounded-lg px-4 py-2 text-sm">
                        <button onclick="addTaskType()" class="bg-accent-blue text-white px-6 py-2 rounded-lg font-bold">Legg til</button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div id="renameModal" class="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-sm bg-[#161B22] border border-[#30363D] rounded-2xl p-6 space-y-4">
            <h3 id="renameModalTitle" class="text-lg font-bold">Endre</h3>
            <div class="space-y-3">
                <input type="text" id="renameInput" class="w-full bg-[#0A0E17] border border-[#30363D] rounded-lg p-3 text-white">
                <div id="renamePointsRow" class="hidden">
                    <input type="number" id="renamePointsInput" class="w-full bg-[#0A0E17] border border-[#30363D] rounded-lg p-3 text-white">
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="closeRenameModal()" class="flex-1 py-3 bg-[#30363D] rounded-xl font-bold">Avbryt</button>
                <button onclick="executeRename()" class="flex-1 py-3 bg-accent-blue text-white rounded-xl font-bold">Lagre</button>
            </div>
        </div>
    </div>

    <script>
        let db;
        let members = [];
        let taskTypes = [];
        let history = [];
        let selectedTasks = [];
        let renameCallback = null;
        let chartInstance = null;

        function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }

        const firebaseConfig = { databaseURL: "https://kollektivet-b26a6-default-rtdb.europe-west1.firebasedatabase.app/" };

        function initApp() {
            const key = document.getElementById('dbKeyInput').value.trim().toLowerCase();
            if (!key) return;
            localStorage.setItem('kollektiv_db_key', key);
            document.getElementById('setupScreen').classList.add('hidden');
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.database().ref(key);
            db.on('value', (s) => {
                const d = s.val() || {};
                members = d.members || [];
                taskTypes = d.taskTypes || [];
                history = d.history || [];
                renderAll();
            });
        }

        const savedKey = localStorage.getItem('kollektiv_db_key');
        if (savedKey) { document.getElementById('dbKeyInput').value = savedKey; initApp(); }
        else { document.getElementById('setupScreen').classList.remove('hidden'); }

        function sync() { if (db) db.set({ members, taskTypes, history }); }

        function showTab(tabId) {
            ['tasks', 'stats', 'history', 'admin'].forEach(id => {
                document.getElementById(`tab-${id}`).classList.add('hidden');
                document.getElementById(`nav-${id}`).classList.replace('text-accent-blue', 'text-textSub');
            });
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.getElementById(`nav-${tabId}`).classList.replace('text-textSub', 'text-accent-blue');
            document.getElementById('tabTitle').innerText = tabId.charAt(0).toUpperCase() + tabId.slice(1);
            if (tabId === 'stats') renderChart();
        }

        function renderAll() {
            renderUserSelect(); renderTaskList(); renderMemberStats();
            renderTodayHistory(); renderAdminMembers(); renderAdminTasks(); updateSummary();
        }

        function renderUserSelect() {
            const select = document.getElementById('userPerforming');
            const saved = localStorage.getItem('kollektiv_user');
            select.innerHTML = members.map(m => `<option value="${m.id}" ${m.id === saved ? 'selected' : ''}>${m.name}</option>`).join('');
            const active = members.find(m => m.id === (saved || (members[0] && members[0].id)));
            document.getElementById('activeUserDisplay').innerText = active ? active.name : 'Ingen';
        }

        function renderTaskList() {
            const container = document.getElementById('taskList');
            container.innerHTML = taskTypes.map(t => {
                const count = selectedTasks.filter(id => id === t.id).length;
                return `<div onclick="toggleTask('${t.id}')" class="card p-4 flex flex-col items-center relative active:scale-95 transition-transform ${count > 0 ? 'border-accent-blue ring-1 ring-accent-blue' : ''}">
                    ${count > 0 ? `<div class="absolute -top-2 -right-2 bg-accent-blue text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">${count}</div>` : ''}
                    <span class="text-sm font-medium">${t.name}</span>
                    <span class="text-[10px] text-textSub font-bold px-2 py-1 bg-[#0A0E17] rounded-full mt-2">${t.points} poeng</span>
                </div>`;
            }).join('');
        }

        function toggleTask(id) { selectedTasks.push(id); updateSummary(); renderTaskList(); }

        function updateSummary() {
            const summary = document.getElementById('selectionSummary');
            if (selectedTasks.length === 0) { summary.classList.add('hidden'); return; }
            summary.classList.remove('hidden');
            const pts = selectedTasks.reduce((s, id) => s + (Number(taskTypes.find(t => t.id === id)?.points) || 0), 0);
            document.getElementById('summaryText').innerText = `${selectedTasks.length} valgt`;
            document.getElementById('summaryPoints').innerText = `${pts} poeng`;
        }

        function saveRegisteredTasks() {
            const uid = document.getElementById('userPerforming').value;
            const m = members.find(mem => mem.id === uid);
            if (!m || selectedTasks.length === 0) return;
            
            const entry = {
                id: generateId(), userId: uid, userName: m.name, points: 0, // Regnes ut i recalculate
                tasks: selectedTasks.map(id => taskTypes.find(t => t.id === id).name.toLowerCase()),
                date: new Date().toISOString()
            };
            history.unshift(entry);
            recalculateAllScores();
            selectedTasks = [];
            sync();
            showTab('stats');
        }

        function recalculateAllScores() {
            history.forEach(h => {
                let total = 0;
                if (h.tasks) {
                    h.tasks.forEach(taskName => {
                        const type = taskTypes.find(tt => tt.name.toLowerCase() === taskName.toLowerCase());
                        if (type) total += (Number(type.points) || 0);
                    });
                }
                h.points = total;
            });
            members.forEach(m => {
                m.points = history
                    .filter(h => h.userId === m.id)
                    .reduce((sum, h) => sum + (Number(h.points) || 0), 0);
            });
        }

        function renderMemberStats() {
            const sorted = [...members].sort((a, b) => (b.points || 0) - (a.points || 0));
            document.getElementById('memberStats').innerHTML = sorted.map((m, i) => `
                <div class="card p-4 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <span class="text-textSub font-bold w-4">${i + 1}</span>
                        <span class="font-bold">${m.name}</span>
                    </div>
                    <span class="text-xl font-black text-accent-blue">${m.points || 0}</span>
                </div>`).join('');
        }

        function renderChart() {
            const ctx = document.getElementById('leaderboardChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            const sorted = [...members].sort((a, b) => (b.points || 0) - (a.points || 0));
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted.map(m => m.name),
                    datasets: [{ data: sorted.map(m => m.points || 0), backgroundColor: '#58A6FF', borderRadius: 6 }]
                },
                options: { 
                    plugins: { legend: { display: false } }, 
                    scales: { y: { beginAtZero: true, grid: { color: '#30363D' } }, x: { grid: { display: false } } } 
                }
            });
        }

        function renderTodayHistory() {
            const container = document.getElementById('historyList');
            if (history.length === 0) { container.innerHTML = '<div class="text-center py-20 text-textSub">Ingen historikk</div>'; return; }
            
            // Punkt 4: Begrens visning til de 50 nyeste for ytelse
            const limitedHistory = history.slice(0, 50);
            document.getElementById('historyLimitText').classList.toggle('hidden', history.length <= 50);

            container.innerHTML = limitedHistory.map(h => {
                const m = members.find(mem => mem.id === h.userId);
                const taskDisplay = h.tasks ? h.tasks.map(t => t.charAt(0).toUpperCase() + t.slice(1)).join(', ') : 'Ingen oppgaver';
                return `<div class="swipe-container card">
                    <div id="swipe-${h.id}" class="swipe-content p-4 flex justify-between items-center">
                        <div class="truncate mr-4">
                            <div class="flex items-center gap-2">
                                <span class="font-bold">${m ? m.name : 'Slettet'}</span>
                                <span class="text-[10px] text-textSub">${new Date(h.date).toLocaleTimeString('no-NO', {hour:'2-digit', minute:'2-digit'})}</span>
                            </div>
                            <p class="text-xs text-textSub truncate">${taskDisplay}</p>
                        </div>
                        <span class="font-bold text-accent-green">+${h.points}</span>
                    </div>
                    <div class="swipe-actions">
                        <button onclick="undo('${h.id}')" class="action-btn bg-danger"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            }).join('');
            initSwipeEvents();
        }

        function undo(id) {
            history = history.filter(h => h.id !== id);
            recalculateAllScores();
            sync();
        }

        function renderAdminMembers() {
            document.getElementById('adminMemberList').innerHTML = members.map(m => `
                <div class="swipe-container card">
                    <div class="swipe-content p-3 flex justify-between items-center">
                        <span>${m.name}</span>
                        <span class="text-xs text-textSub font-bold">${m.points || 0} p</span>
                    </div>
                    <div class="swipe-actions">
                        <button onclick="startRenameMember('${m.id}')" class="action-btn bg-accent-blue"><i class="fas fa-pen"></i></button>
                        <button onclick="deleteMember('${m.id}')" class="action-btn bg-danger"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`).join('');
            initSwipeEvents();
        }

        function renderAdminTasks() {
            document.getElementById('adminTaskList').innerHTML = taskTypes.map(t => `
                <div class="swipe-container card">
                    <div class="swipe-content p-3 flex justify-between items-center">
                        <span>${t.name}</span>
                        <span class="text-xs text-textSub font-bold">${t.points} p</span>
                    </div>
                    <div class="swipe-actions">
                        <button onclick="startRenameTask('${t.id}')" class="action-btn bg-accent-blue"><i class="fas fa-pen"></i></button>
                        <button onclick="deleteTaskType('${t.id}')" class="action-btn bg-danger"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`).join('');
            initSwipeEvents();
        }

        function addMember() {
            const n = document.getElementById('newMemberName').value.trim();
            if (n) { members.push({ id: generateId(), name: n, points: 0 }); sync(); document.getElementById('newMemberName').value = ''; }
        }

        function addTaskType() {
            const n = document.getElementById('newTaskName').value.trim();
            const p = parseInt(document.getElementById('newTaskPoints').value);
            if (n && !isNaN(p)) { taskTypes.push({ id: generateId(), name: n, points: p }); sync(); document.getElementById('newTaskName').value = ''; document.getElementById('newTaskPoints').value = ''; }
        }

        // Punkt 1: Slett også all tilhørende historikk
        function deleteMember(id) { 
            if(confirm('Slette medlem? Dette vil også fjerne all historikk tilknyttet denne personen.')) { 
                history = history.filter(h => h.userId !== id);
                members = members.filter(m => m.id !== id); 
                recalculateAllScores();
                sync(); 
            } 
        }

        function deleteTaskType(id) {
            const t = taskTypes.find(tt => tt.id === id);
            if (t && confirm(`Slette "${t.name}"? Dette vil fjerne oppgaven fra all historikk og rekalkulere poeng.`)) {
                const nameLower = t.name.toLowerCase();
                history.forEach(h => { if(h.tasks) h.tasks = h.tasks.filter(tn => tn !== nameLower); });
                taskTypes = taskTypes.filter(tt => tt.id !== id);
                recalculateAllScores();
                sync();
            }
        }

        function startRenameTask(id) {
            const t = taskTypes.find(tt => tt.id === id);
            if (!t) return;
            openRenameModal('Endre oppgave', t.name, (newName, newPoints) => {
                // Punkt 3: Hindre tomt navn
                if (!newName.trim()) return;
                const oldNameLower = t.name.toLowerCase();
                const newNameLower = newName.toLowerCase().trim();
                history.forEach(h => { if(h.tasks) h.tasks = h.tasks.map(tn => tn === oldNameLower ? newNameLower : tn); });
                t.name = newName.trim();
                if (newPoints !== undefined && !isNaN(newPoints)) t.points = newPoints;
                recalculateAllScores();
                sync();
            }, true, t.points);
        }

        function startRenameMember(id) {
            const m = members.find(mem => mem.id === id);
            if (m) openRenameModal('Endre navn', m.name, (n) => { 
                if(!n.trim()) return;
                m.name = n.trim(); 
                sync(); 
            });
        }

        function openRenameModal(t, v, c, s, p) {
            renameCallback = c;
            document.getElementById('renameModalTitle').innerText = t;
            document.getElementById('renameInput').value = v;
            document.getElementById('renamePointsRow').classList.toggle('hidden', !s);
            if (s) document.getElementById('renamePointsInput').value = p;
            document.getElementById('renameModal').classList.remove('hidden');
        }

        function executeRename() {
            const n = document.getElementById('renameInput').value.trim();
            const p = parseInt(document.getElementById('renamePointsInput').value);
            if (n && renameCallback) renameCallback(n, isNaN(p) ? undefined : p);
            closeRenameModal();
        }

        function closeRenameModal() { document.getElementById('renameModal').classList.add('hidden'); }

        let touchStartX = 0;
        function initSwipeEvents() {
            document.querySelectorAll('.swipe-content').forEach(el => {
                el.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; el.style.transition = 'none'; }, {passive:true});
                el.addEventListener('touchmove', e => {
                    let d = e.touches[0].clientX - touchStartX;
                    if (d < 0) el.style.transform = `translateX(${Math.max(d, -140)}px)`;
                }, {passive:true});
                el.addEventListener('touchend', e => {
                    el.style.transition = 'transform 0.3s ease-out';
                    let d = e.changedTouches[0].clientX - touchStartX;
                    el.style.transform = d < -70 ? `translateX(-140px)` : `translateX(0)`;
                }, {passive:true});
            });
        }

        document.getElementById('userPerforming').addEventListener('change', function() {
            localStorage.setItem('kollektiv_user', this.value);
            renderUserSelect();
        });
    </script>
</body>
</html>
