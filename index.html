    <style>

        .mini-calendar .cal-year-select { display: flex; align-items: center; gap: 6px; }

        .mini-calendar .cal-year-label { font-size: 13px; color: #7C3AED; font-weight: bold; cursor: pointer; min-width: 42px; text-align: center; }

        .cal-year-dropdown button { display: block; width: 100%; padding: 8px 16px; background: none; border: none; color: #CBD5E1; font-size: 13px; cursor: pointer; text-align: center; transition: background 0.15s; }

        .swipe-item .desktop-menu-btn { display: none; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); z-index: 10; background: rgba(255,255,255,0.08); border: none; color: #8D9CB1; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; align-items: center; justify-content: center; transition: background 0.15s, color 0.15s; }

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAYZBldRXfzXX_CAGBzDEoz-SduPA1g_S8",
            authDomain: "kollektivet-fc493.firebaseapp.com",
            databaseURL: "https://kollektivet-fc493-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kollektivet-fc493",
            storageBucket: "kollektivet-fc493.firebasestorage.app",
            messagingSenderId: "131176107292",
            appId: "1:131176107292:web:1a375b8560e00bba4b7ed9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const defaultTaskTypes = [
            { id: 1, name: "Redd sengen", points: 10, icon: 'bed' },
            { id: 2, name: "Laget kaffe", points: 5, icon: 'mug-hot' },
            { id: 3, name: "Tatt oppvasken", points: 15, icon: 'utensils' },
            { id: 4, name: "Gått med søpla", points: 20, icon: 'trash' },
            { id: 5, name: "Vasket gulvet", points: 50, icon: 'broom' }
        ];

        let members = [], taskTypes = [], history = [], myChart, selectedTasksOnScreen = [];
        let activePeriod = 'today';

        db.ref('/').on('value', (snapshot) => {
            const raw = snapshot.val();
            const isFirstLoad = raw === null;
            const data = raw || {};
            members = data.members || [];
            taskTypes = isFirstLoad ? defaultTaskTypes : (data.taskTypes || []);
            history = data.history || [];
            fixDuplicateColors();
            renderAll();
        });

        function sync() { db.ref('/').set({ members, taskTypes, history }); }

        const allColors = [
            '#F87171', '#60A5FA', '#34D399', '#FBBF24', '#A78BFA', '#F472B6', '#FB923C', '#22D3EE', '#818CF8', '#A3E635', '#E879F9', '#2DD4BF', '#FCA5A5', '#93C5FD', '#6EE7B7', '#FDE047', '#C4B5FD', '#F9A8D4', '#67E8F9', '#BEF264'
        ];

        function fixDuplicateColors() {
            const usedColors = new Set();
            let changed = false;
            members.forEach(m => {
                if (usedColors.has(m.color) || !m.color) {
                    const available = allColors.filter(c => !usedColors.has(c));
                    m.color = available.length > 0 ? available[0] : allColors[Math.floor(Math.random() * allColors.length)];
                    changed = true;
                }
                usedColors.add(m.color);
            });
            if (changed) sync();
        }

        const periods = [
            { key: 'today', label: 'I dag' },
            { key: 'yesterday', label: 'I går' },
            { key: 'thisWeek', label: 'Denne uken' },
            { key: 'lastWeek', label: 'Forrige uke' },
            { key: 'thisMonth', label: 'Denne måneden' },
            { key: 'lastMonth', label: 'Forrige måned' },
            { key: 'all', label: 'Alltid' }
        ];

        function getDateRange(key) {
            const now = new Date();
            const startOfDay = d => new Date(d.getFullYear(), d.getMonth(), d.getDate());
            const today = startOfDay(now);
            switch(key) {
                case 'today': return { start: today, end: new Date(today.getTime() + 86400000) };
                case 'yesterday': { const y = new Date(today.getTime() - 86400000); return { start: y, end: today }; }
                case 'thisWeek': { const d = now.getDay(); const diff = d === 0 ? 6 : d - 1; const mon = new Date(today.getTime() - diff * 86400000); return { start: mon, end: new Date(today.getTime() + 86400000) }; }
                case 'lastWeek': { const d = now.getDay(); const diff = d === 0 ? 6 : d - 1; const thisMon = new Date(today.getTime() - diff * 86400000); return { start: new Date(thisMon.getTime() - 7 * 86400000), end: thisMon }; }
                case 'thisMonth': return { start: new Date(now.getFullYear(), now.getMonth(), 1), end: new Date(today.getTime() + 86400000) };
                case 'lastMonth': return { start: new Date(now.getFullYear(), now.getMonth() - 1, 1), end: new Date(now.getFullYear(), now.getMonth(), 1) };
                case 'all': return { start: new Date(0), end: new Date(today.getTime() + 86400000) };
            }
        }

        function filterHistory(key) {
            const { start, end } = getDateRange(key);
            return history.filter(h => { const d = new Date(h.date); return d >= start && d < end; });
        }

        function getPointsForPeriod(memberId, key) {
            return filterHistory(key).filter(h => h.userId === memberId).reduce((sum, h) => sum + h.points, 0);
        }

        function setPeriod(key) {
            activePeriod = key;
            renderAll();
        }

        function renderPeriodButtons() {
            document.getElementById('periodButtons').innerHTML = periods.map(p => {
                const active = p.key === activePeriod;
                return `<button onclick="setPeriod('${p.key}')" class="px-3 py-1.5 rounded-full font-bold text-center transition-all whitespace-nowrap ${active ? 'bg-taskBlue text-white' : 'bg-white/5 text-textSub hover:bg-white/10'}">${p.label}</button>`;
            }).join('');
        }

        function renderAll() {
            renderPeriodButtons();
            renderLeaderboardAndChart();
            renderTodayHistory();
            renderAdminLists();
            const sel = document.getElementById('userPerforming');
            sel.innerHTML = '<option value="">Hvem er du?</option>' + members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
            const savedUser = loadSelectedUser();
            if (savedUser && members.find(m => String(m.id) === savedUser)) {
                sel.value = savedUser;
            }
        }

        function renderLeaderboardAndChart() {
            const statusEl = document.getElementById('leadStatus');
            const legendEl = document.getElementById('chartLegend');
            if (!members.length) { statusEl.innerText = "Legg til medlemmer!"; return; }

            const membersWithPeriodPoints = members.map(m => ({ ...m, periodPoints: getPointsForPeriod(m.id, activePeriod) }));
            const sorted = [...membersWithPeriodPoints].sort((a,b) => b.periodPoints - a.periodPoints);
            statusEl.innerText = sorted[0].periodPoints > 0 ? `${sorted[0].name.split(' ')[0]} leder!` : "Ingen poeng ennå";

            if(!selectedTasksOnScreen.length) return alert("Velg minst én ting du har gjort!");

        // Funksjon for å endre selve bidraget (dato eller oppgaver)
        function startEditContribution(id) {
            closeAllSwipes();
            closeDesktopMenu();
            const h = history.find(i => i.id === id);
            if(!h) return;

            // Vi gjenbruker Task Selection skjermen for å endre oppgaver, 
            // men legger til en måte å endre dato også.
            selectedTasksOnScreen = [];
            h.tasks.forEach(tName => {
                const found = taskTypes.find(tt => tt.name.toLowerCase() === tName.toLowerCase());
                if(found) selectedTasksOnScreen.push(found.id);
            });

            showTaskSelection();
            
            // Endrer Lagre-knappen midlertidig til å oppdatere eksisterende i stedet for ny
            const saveBtn = document.querySelector('#taskSelectionScreen button[onclick="saveRegisteredTasks()"]');
            const originalOnclick = saveBtn.getAttribute('onclick');
            
            // Legger til en datovelger i task selection
            const dateBtn = document.createElement('button');
            dateBtn.id = "tempDateBtn";
            dateBtn.className = "w-full bg-cardBg p-4 rounded-2xl text-textMain mb-4 border border-white/10 flex justify-between";
            dateBtn.innerHTML = `<span>Endre dato (${new Date(h.date).toLocaleDateString()})</span> <i class="fas fa-calendar-alt text-accent"></i>`;
            dateBtn.onclick = () => openDatePicker(id);
            document.getElementById('userPerforming').parentElement.after(dateBtn);

            saveBtn.onclick = () => {
                const taskNames = [];
                let totalPoints = 0;
                selectedTasksOnScreen.forEach(tid => {
                    const t = taskTypes.find(tt => tt.id === tid);
                    taskNames.push(t.name.toLowerCase());
                    totalPoints += t.points;
                });
                h.tasks = taskNames;
                h.points = totalPoints;
                
                sync();
                hideTaskSelection();
                // Rydd opp
                saveBtn.setAttribute('onclick', originalOnclick);
                if(document.getElementById('tempDateBtn')) document.getElementById('tempDateBtn').remove();
            };

        function closeAllSwipes() {
            document.querySelectorAll('.swipe-item').forEach(item => {
                const c = item.querySelector('.swipe-content');
                c.style.transition = 'transform 0.25s ease';
                c.style.transform = 'translateX(0)';
                const a = item.querySelector('.swipe-actions');
                if (a) setTimeout(() => { a.style.visibility = 'hidden'; }, 250);
            });
            currentlyOpenSwipe = null;
        }

        function initSwipeHandlers() {
            document.querySelectorAll('.swipe-item').forEach(item => {
                let startX = 0, startY = 0, currentX = 0, swiping = false, isHorizontal = null;
                const content = item.querySelector('.swipe-content');
                const revealWidth = 144;
                const threshold = 60;
                const actions = item.querySelector('.swipe-actions');

                item.addEventListener('touchstart', e => {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    currentX = startX;
                    swiping = true;
                    isHorizontal = null;
                    content.style.transition = 'none';
                }, { passive: true });

                item.addEventListener('touchmove', e => {
                    if (!swiping) return;
                    const dx = e.touches[0].clientX - startX;
                    const dy = e.touches[0].clientY - startY;
                    if (isHorizontal === null && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
                        isHorizontal = Math.abs(dx) > Math.abs(dy);
                    }
                    if (isHorizontal === false) { swiping = false; return; }
                    if (isHorizontal !== true) return;
                    if (actions) actions.style.visibility = 'visible';
                    currentX = e.touches[0].clientX;
                    let diff = currentX - startX;
                    if (diff > 0) diff = 0;
                    if (diff < -revealWidth) diff = -revealWidth;
                    content.style.transform = `translateX(${diff}px)`;
                }, { passive: true });

                item.addEventListener('touchend', () => {
                    if (!swiping || isHorizontal !== true) { swiping = false; return; }
                    swiping = false;
                    content.style.transition = 'transform 0.25s ease';
                    const diff = currentX - startX;
                    if (diff < -threshold) {
                        if (currentlyOpenSwipe && currentlyOpenSwipe !== item) {
                            const otherContent = currentlyOpenSwipe.querySelector('.swipe-content');
                            otherContent.style.transition = 'transform 0.25s ease';
                            otherContent.style.transform = 'translateX(0)';
                            const otherActions = currentlyOpenSwipe.querySelector('.swipe-actions');
                            if (otherActions) setTimeout(() => { otherActions.style.visibility = 'hidden'; }, 250);
                        }
                        content.style.transform = `translateX(-${revealWidth}px)`;
                        currentlyOpenSwipe = item;
                    } else {
                        content.style.transform = 'translateX(0)';
                        if (actions) setTimeout(() => { actions.style.visibility = 'hidden'; }, 250);
                        if (currentlyOpenSwipe === item) currentlyOpenSwipe = null;
                    }
                });
            });

            document.addEventListener('touchstart', e => {
                if (currentlyOpenSwipe && !currentlyOpenSwipe.contains(e.target)) {
                    closeAllSwipes();
                }
            }, { passive: true });
        }

            document.querySelectorAll('.admin-swipe-item').forEach(item => {
                let startX = 0, startY = 0, currentX = 0, swiping = false, isHorizontal = null;
                const content = item.querySelector('.swipe-content');
                const revealWidth = 144;
                const threshold = 60;
                const actions = item.querySelector('.swipe-actions');

                item.addEventListener('touchstart', e => {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    currentX = startX;
                    swiping = true;
                    isHorizontal = null;
                    content.style.transition = 'none';
                }, { passive: true });

                item.addEventListener('touchmove', e => {
                    if (!swiping) return;
                    const dx = e.touches[0].clientX - startX;
                    const dy = e.touches[0].clientY - startY;
                    if (isHorizontal === null && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
                        isHorizontal = Math.abs(dx) > Math.abs(dy);
                    }
                    if (isHorizontal === false) { swiping = false; return; }
                    if (isHorizontal !== true) return;
                    if (actions) actions.style.visibility = 'visible';
                    currentX = e.touches[0].clientX;
                    let diff = currentX - startX;
                    if (diff > 0) diff = 0;
                    if (diff < -revealWidth) diff = -revealWidth;
                    content.style.transform = `translateX(${diff}px)`;
                }, { passive: true });

                item.addEventListener('touchend', () => {
                    if (!swiping || isHorizontal !== true) { swiping = false; return; }
                    swiping = false;
                    content.style.transition = 'transform 0.25s ease';
                    const diff = currentX - startX;
                    if (diff < -threshold) {
                        if (currentlyOpenAdminSwipe && currentlyOpenAdminSwipe !== item) {
                            const otherContent = currentlyOpenAdminSwipe.querySelector('.swipe-content');
                            otherContent.style.transition = 'transform 0.25s ease';
                            otherContent.style.transform = 'translateX(0)';
                            const otherActions = currentlyOpenAdminSwipe.querySelector('.swipe-actions');
                            if (otherActions) setTimeout(() => { otherActions.style.visibility = 'hidden'; }, 250);
                        }
                        content.style.transform = `translateX(-${revealWidth}px)`;
                        currentlyOpenAdminSwipe = item;
                    } else {
                        content.style.transform = 'translateX(0)';
                        if (actions) setTimeout(() => { actions.style.visibility = 'hidden'; }, 250);
                        if (currentlyOpenAdminSwipe === item) currentlyOpenAdminSwipe = null;
                    }
                });
            });

            document.addEventListener('touchstart', e => {
                if (currentlyOpenAdminSwipe && !currentlyOpenAdminSwipe.contains(e.target)) {
                    closeAllAdminSwipes();
                }
            }, { passive: true });
        }

        function toggleAdminDesktopMenu(type, id, btn) {
            closeDesktopMenu();
            const existing = btn.parentElement.querySelector('.desktop-dropdown');
            if (existing) { existing.remove(); btn.classList.remove('active'); return; }
            btn.classList.add('active');
            const dropdown = document.createElement('div');
            dropdown.className = 'desktop-dropdown';
            if (type === 'member') {
                dropdown.innerHTML = `
                    <button onclick="event.stopPropagation(); closeDesktopMenu(); startRenameMember(${id})"><i class="fas fa-pen" style="color:#3B82F6"></i> Endre navn</button>
                    <button class="delete-option" onclick="event.stopPropagation(); closeDesktopMenu(); deleteMember(${id})"><i class="fas fa-trash-alt"></i> Slett medlem</button>`;
            } else {
                dropdown.innerHTML = `
                    <button onclick="event.stopPropagation(); closeDesktopMenu(); startRenameTask(${id})"><i class="fas fa-pen" style="color:#3B82F6"></i> Endre oppgave</button>
                    <button class="delete-option" onclick="event.stopPropagation(); closeDesktopMenu(); deleteTaskType(${id})"><i class="fas fa-trash-alt"></i> Slett oppgave</button>`;
            }
            document.body.appendChild(dropdown);
            const rect = btn.getBoundingClientRect();
            dropdown.style.top = (rect.bottom + 4) + 'px';
            dropdown.style.left = (rect.right - 160) + 'px';
            currentDesktopMenu = { dropdown, btn };
        }

        function showAdminContextMenu(e, type, id) {
            if (!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;
            e.preventDefault();
            closeDesktopMenu();
            const dropdown = document.createElement('div');
            dropdown.className = 'desktop-dropdown';
            if (type === 'member') {
                dropdown.innerHTML = `
                    <button onclick="event.stopPropagation(); closeDesktopMenu(); startRenameMember(${id})"><i class="fas fa-pen" style="color:#3B82F6"></i> Endre navn</button>
                    <button class="delete-option" onclick="event.stopPropagation(); closeDesktopMenu(); deleteMember(${id})"><i class="fas fa-trash-alt"></i> Slett medlem</button>`;
            } else {
                dropdown.innerHTML = `
                    <button onclick="event.stopPropagation(); closeDesktopMenu(); startRenameTask(${id})"><i class="fas fa-pen" style="color:#3B82F6"></i> Endre oppgave</button>
                    <button class="delete-option" onclick="event.stopPropagation(); closeDesktopMenu(); deleteTaskType(${id})"><i class="fas fa-trash-alt"></i> Slett oppgave</button>`;
            }
            document.body.appendChild(dropdown);
            dropdown.style.top = e.clientY + 'px';
            dropdown.style.left = e.clientX + 'px';
            currentDesktopMenu = { dropdown, btn: null };
        }

        let renameCallback = null;

        function openRenameModal(title, currentValue, callback, showPoints, currentPoints) {
            renameCallback = callback;
            document.getElementById('renameModalTitle').innerText = title;
            const input = document.getElementById('renameInput');
            input.value = currentValue;
            const pointsRow = document.getElementById('renamePointsRow');
            const pointsInput = document.getElementById('renamePointsInput');
            if (showPoints) {
                pointsRow.classList.remove('hidden');
                pointsInput.value = currentPoints !== undefined ? currentPoints : '';
            } else {
                pointsRow.classList.add('hidden');
                pointsInput.value = '';
            }
            document.getElementById('renameModal').classList.remove('hidden');
            setTimeout(() => input.focus(), 100);
            input.onkeydown = function(e) { if (e.key === 'Enter') executeRename(); };
            pointsInput.onkeydown = function(e) { if (e.key === 'Enter') executeRename(); };
        }

        function closeRenameModal() {
            document.getElementById('renameModal').classList.add('hidden');
            renameCallback = null;
        }

        function executeRename() {
            const newName = document.getElementById('renameInput').value.trim();
            const pointsInput = document.getElementById('renamePointsInput');
            const newPoints = pointsInput.value !== '' ? parseInt(pointsInput.value) : undefined;
            if (newName && renameCallback) {
                renameCallback(newName, newPoints);
            }
            closeRenameModal();
        }

        function startRenameMember(id) {
            closeAllAdminSwipes();
            const m = members.find(mem => mem.id === id);
            if (!m) return;
            openRenameModal('Endre navn', m.name, function(newName) {
                if (newName !== m.name) {
                    m.name = newName;
                    sync();
                }
            });
        }

        function startRenameTask(id) {
            closeAllAdminSwipes();
            const t = taskTypes.find(tt => tt.id === id);
            if (!t) return;
            openRenameModal('Endre oppgave', t.name, function(newName, newPoints) {
                let changed = false;
                if (newName !== t.name) {
                    const oldNameLower = t.name.toLowerCase();
                    const newNameLower = newName.toLowerCase();
                    t.name = newName;
                    history.forEach(h => {
                        h.tasks = h.tasks.map(tn => tn === oldNameLower ? newNameLower : tn);
                    });
                    changed = true;
                }
                if (newPoints !== undefined && !isNaN(newPoints) && newPoints > 0 && newPoints !== t.points) {
                    t.points = newPoints;
                    // HER ER LOGIKKEN FOR Å OPPDATERE ALLE BIDRAG
                    history.forEach(h => {
                        let total = 0;
                        h.tasks.forEach(tName => {
                            const foundType = taskTypes.find(tt => tt.name.toLowerCase() === tName.toLowerCase());
                            if(foundType) total += foundType.points;
                        });
                        h.points = total;
                    });
                    changed = true;
                }
                if (changed) sync();
            }, true, t.points);
        }

        function openDatePicker(historyId) {
            closeAllSwipes();
            const h = history.find(i => i.id === historyId);
            if (!h) return;
            const currentDate = new Date(h.date);
            renderCalendar(historyId, currentDate.getFullYear(), currentDate.getMonth(), currentDate);
        }

        function getEarliestYear() {
            if (!history.length) return new Date().getFullYear();
            let earliest = Infinity;
            history.forEach(h => {
                const y = new Date(h.date).getFullYear();
                if (y < earliest) earliest = y;
            });
            return earliest;
        }

        function renderCalendar(historyId, year, month, selectedDate) {
            const existing = document.getElementById('miniCalendarOverlay');
            if (existing) existing.remove();

            const currentYear = new Date().getFullYear();
            const earliestYear = getEarliestYear();
            if (year < earliestYear) year = earliestYear;
            if (year > currentYear) year = currentYear;
            
            const monthNames = ['Januar', 'Februar', 'Mars', 'April', 'Mai', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'Desember'];
            const dayLabels = ['Ma', 'Ti', 'On', 'To', 'Fr', 'Lø', 'Sø'];

            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            let startDow = firstDay.getDay();
            startDow = startDow === 0 ? 6 : startDow - 1;

            const selY = selectedDate.getFullYear(), selM = selectedDate.getMonth(), selD = selectedDate.getDate();

            let daysHtml = dayLabels.map(d => `<div class="cal-day-label">${d}</div>`).join('');

            const prevLastDay = new Date(year, month, 0).getDate();
            for (let i = startDow - 1; i >= 0; i--) {
                daysHtml += `<div class="cal-day other-month">${prevLastDay - i}</div>`;
            }

            const now = new Date();
            const todayY = now.getFullYear(), todayM = now.getMonth(), todayD = now.getDate();
            for (let d = 1; d <= lastDay.getDate(); d++) {
                const isSel = (year === selY && month === selM && d === selD);
                const isToday = (year === todayY && month === todayM && d === todayD);
                const isFuture = new Date(year, month, d) > new Date(todayY, todayM, todayD);
                let cls = 'cal-day';
                if (isSel) cls += ' selected';
                if (isToday) cls += ' today';
                if (isFuture) cls += ' future';
                daysHtml += `<div class="${cls}"${!isFuture ? ` onclick="selectCalendarDate(${historyId}, ${year}, ${month}, ${d})"` : ''}>${d}</div>`;
            }

            const totalCells = startDow + lastDay.getDate();
            const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let d = 1; d <= remaining; d++) {
                daysHtml += `<div class="cal-day other-month">${d}</div>`;
            }

            let yearOptionsHtml = '';
            for (let y = currentYear; y >= earliestYear; y--) {
                yearOptionsHtml += `<button class="${y === year ? 'active-year' : ''}" onclick="event.stopPropagation(); renderCalendar(${historyId}, ${y}, ${month}, new Date('${selectedDate.toISOString()}'))">${y}</button>`;
            }

            const overlay = document.createElement('div');
            overlay.id = 'miniCalendarOverlay';
            overlay.className = 'mini-calendar-overlay';
            overlay.innerHTML = `
                <div class="mini-calendar" onclick="event.stopPropagation()">
                    <div class="cal-header">
                        <div style="display:flex;flex-direction:column;align-items:flex-start;gap:4px">
                            <button onclick="closeCalendar()" class="text-textSub text-sm font-bold px-2 py-1">Avbryt</button>
                            <div style="position:relative;display:inline-block;margin-left:2px">
                                <span class="cal-year-label" onclick="event.stopPropagation(); this.nextElementSibling.classList.toggle('hidden')" style="display:inline-flex;align-items:center;gap:4px">${year} <i class="fas fa-chevron-down" style="font-size:9px"></i></span>
                                <div class="cal-year-dropdown hidden">${yearOptionsHtml}</div>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="renderCalendar(${historyId}, ${month === 0 ? year - 1 : year}, ${month === 0 ? 11 : month - 1}, new Date('${selectedDate.toISOString()}'))" class="text-textSub px-2 py-1"><i class="fas fa-chevron-left"></i></button>
                            <span class="font-bold text-sm" style="min-width:90px;text-align:center">${monthNames[month]}</span>
                            <button ${year === new Date().getFullYear() && month === new Date().getMonth() ? 'disabled style="opacity:0.25;cursor:not-allowed" class="text-textSub px-2 py-1"' : `onclick="renderCalendar(${historyId}, ${month === 11 ? year + 1 : year}, ${month === 11 ? 0 : month + 1}, new Date('${selectedDate.toISOString()}'))" class="text-textSub px-2 py-1"`}><i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>
                    <div class="cal-grid">${daysHtml}</div>
                </div>`;
            overlay.addEventListener('click', closeCalendar);
            document.body.appendChild(overlay);
        }

        function selectCalendarDate(historyId, year, month, day) {
            const h = history.find(i => i.id === historyId);
            if (!h) return;
            const oldDate = new Date(h.date);
            const newDate = new Date(year, month, day, oldDate.getHours(), oldDate.getMinutes(), oldDate.getSeconds());
            h.date = newDate.toISOString();
            sync();
            closeCalendar();
            // Oppdaterer visning hvis vi er inne i Edit-modus
            if(document.getElementById('tempDateBtn')) {
                document.getElementById('tempDateBtn').querySelector('span').innerText = `Endre dato (${newDate.toLocaleDateString()})`;
            }
        }

        function closeCalendar() {
            const overlay = document.getElementById('miniCalendarOverlay');
            if (overlay) overlay.remove();
        }

        function saveSelectedUser(userId) {
            if (userId) localStorage.setItem('kollektiv_user', userId);
        }

        function loadSelectedUser() {
            return localStorage.getItem('kollektiv_user');
        }

        document.getElementById('userPerforming').addEventListener('change', function() {
            saveSelectedUser(this.value);
        });
    </script>
</body>
