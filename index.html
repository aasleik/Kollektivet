<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kollektivet</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kollektivet">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0A0E17">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        appBg: '#0A0E17',
                        cardBg: '#151C2C',
                        textMain: '#F8FAFC',
                        textSub: '#8D9CB1',
                        accent: '#7C3AED',
                        taskCyan: '#2DD4BF',
                        taskBlue: '#2563EB'
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        body { -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        input, select, textarea { font-size: 16px !important; }
        button, a, [role="button"] { min-height: 44px; }
    </style>
</head>
<body class="bg-appBg text-textMain min-h-screen flex flex-col overflow-x-hidden">

    <div id="mainScreen" class="flex-1 flex flex-col p-5 pb-24">
        <header class="flex justify-between items-center mb-6 pt-2">
            <h1 class="text-xl font-bold">Oversikt</h1>
            <button onclick="toggleModal('adminModal')" class="text-xl text-textSub p-2"><i class="fas fa-cog"></i></button>
        </header>

        <section class="bg-cardBg rounded-3xl p-6 mb-6 shadow-xl border border-white/5">
            <h2 id="leadStatus" class="text-xl font-bold mb-3 text-center text-textSub">Laster data...</h2>
            <div class="flex justify-center">
                <canvas id="pointsChart" style="max-height: 140px; max-width: 140px;"></canvas>
            </div>
            <div id="chartLegend" class="flex flex-wrap justify-center gap-x-4 gap-y-1 text-sm font-medium mt-4 text-textSub"></div>
        </section>

        <section class="flex-1 space-y-6">
            <h2 class="text-3xl font-extrabold">Historikk</h2>
            <div id="todayHistory" class="space-y-4"></div>
        </section>

        <button onclick="showTaskSelection()" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-accent text-white px-8 py-4 rounded-full font-bold shadow-2xl shadow-accent/40 text-lg flex items-center gap-2.5 z-10 active:scale-95 transition-transform">
            <i class="fas fa-plus text-sm"></i> Legg til bidrag
        </button>
    </div>

    <div id="taskSelectionScreen" class="hidden fixed inset-0 bg-appBg z-50 p-5 flex flex-col overflow-y-auto">
        <header class="flex justify-between items-center mb-6">
            <button onclick="hideTaskSelection()" class="text-textMain text-sm flex items-center gap-1.5"><i class="fas fa-chevron-left"></i> Tilbake</button>
            <h1 class="text-xl font-bold">Nytt bidrag</h1>
            <div></div>
        </header>

        <div class="relative mb-6">
            <label class="text-xs text-textSub mb-2 block ml-1 uppercase font-bold">Hvem er du?</label>
            <select id="userPerforming" class="w-full bg-cardBg p-4 rounded-2xl text-textMain outline-none border border-white/10 appearance-none">
                <option value="">Velg navn...</option>
            </select>
            <i class="fas fa-chevron-down absolute right-4 bottom-5 text-textSub pointer-events-none"></i>
        </div>

        <h2 class="text-4xl font-extrabold mb-8 leading-tight">Hva har du gjort i dag?</h2>
        
        <div id="taskBubbleContainer" class="flex flex-wrap gap-3 pb-32"></div>

        <button onclick="saveRegisteredTasks()" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-accent text-white px-12 py-4 rounded-full font-bold shadow-2xl z-10 active:scale-95 transition-transform">
            Lagre
        </button>
    </div>

    <div id="adminModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-6" onclick="toggleModal('adminModal')">
        <div class="bg-cardBg rounded-3xl p-6 w-full max-w-sm border border-white/10" onclick="event.stopPropagation()">
            <h3 class="text-lg font-bold mb-6 text-center">Innstillinger</h3>
            <div class="space-y-3">
                <button onclick="toggleModal('adminModal'); toggleModal('memberModal')" class="w-full bg-appBg p-5 rounded-2xl flex justify-between items-center border border-white/5 font-medium"><span>Medlemmer</span><i class="fas fa-user-friends text-accent"></i></button>
                <button onclick="toggleModal('adminModal'); toggleModal('taskAdminModal')" class="w-full bg-appBg p-5 rounded-2xl flex justify-between items-center border border-white/5 font-medium"><span>Oppgaver</span><i class="fas fa-tasks text-accent"></i></button>
            </div>
            <button onclick="toggleModal('adminModal')" class="mt-8 w-full text-textSub text-sm font-bold">Lukk</button>
        </div>
    </div>

    <div id="memberModal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-6" onclick="toggleModal('memberModal')">
        <div class="bg-cardBg rounded-3xl p-6 w-full max-w-sm" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold mb-4">Medlemmer</h3>
            <div class="flex gap-2 mb-6">
                <input type="text" id="newMemberName" placeholder="Navn..." class="flex-1 bg-appBg p-4 rounded-xl border border-white/10 text-sm">
                <button onclick="addMember()" class="bg-accent px-5 rounded-xl font-bold"><i class="fas fa-plus"></i></button>
            </div>
            <div id="manageMembersList" class="space-y-2 max-h-60 overflow-y-auto"></div>
            <button onclick="toggleModal('memberModal')" class="mt-8 w-full text-textSub font-bold">Tilbake</button>
        </div>
    </div>

    <div id="taskAdminModal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-6" onclick="toggleModal('taskAdminModal')">
        <div class="bg-cardBg rounded-3xl p-6 w-full max-w-sm overflow-y-auto max-h-[85vh]" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold mb-4">Oppgaver</h3>
            <div class="space-y-3 mb-6 bg-appBg p-4 rounded-2xl border border-white/5">
                <input type="text" id="newTaskName" placeholder="Navn..." class="w-full bg-cardBg p-3 rounded-lg border border-white/10 text-sm">
                <input type="number" id="newTaskPoints" placeholder="Poeng" class="w-full bg-cardBg p-3 rounded-lg border border-white/10 text-sm">
                <button onclick="addTaskType()" class="w-full bg-accent py-3 rounded-xl font-bold">Legg til</button>
            </div>
            <div id="manageTasksList" class="space-y-2"></div>
            <button onclick="toggleModal('taskAdminModal')" class="mt-8 w-full text-textSub font-bold">Tilbake</button>
        </div>
    </div>

    <div id="renameModal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-6" onclick="closeRenameModal()">
        <div class="bg-cardBg rounded-3xl p-6 w-full max-w-sm border border-white/10" onclick="event.stopPropagation()">
            <h3 id="renameModalTitle" class="text-xl font-bold mb-4 text-center">Endre</h3>
            <div class="space-y-4">
                <input type="text" id="renameInput" class="w-full bg-appBg p-4 rounded-xl border border-white/10 text-sm">
                <div id="pointsEditContainer" class="hidden">
                    <label class="text-[10px] text-textSub font-bold uppercase ml-1 block mb-1">Poengverdi</label>
                    <input type="number" id="renamePointsInput" class="w-full bg-appBg p-4 rounded-xl border border-white/10 text-sm">
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="closeRenameModal()" class="flex-1 py-4 rounded-2xl bg-white/5 font-bold">Avbryt</button>
                <button onclick="executeRename()" class="flex-1 py-4 rounded-2xl bg-accent text-white font-bold">Lagre</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAYZBldRXfzXX_CAGBzDEoz-SduPA1g_S8",
            authDomain: "kollektivet-fc493.firebaseapp.com",
            databaseURL: "https://kollektivet-fc493-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kollektivet-fc493",
            storageBucket: "kollektivet-fc493.firebasestorage.app",
            messagingSenderId: "131176107292",
            appId: "1:131176107292:web:1a375b8560e00bba4b7ed9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let members = [], taskTypes = [], history = [], myChart, selectedTasksOnScreen = [];
        let editTarget = null;

        db.ref('/').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            members = data.members || [];
            taskTypes = data.taskTypes || [];
            history = data.history || [];
            renderAll();
        });

        function sync() { db.ref('/').set({ members, taskTypes, history }); }
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        function closeRenameModal() { document.getElementById('renameModal').classList.add('hidden'); }

        function getFriendlyDate(isoString) {
            const date = new Date(isoString);
            const today = new Date();
            const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
            if (date.toDateString() === today.toDateString()) return "I dag";
            if (date.toDateString() === yesterday.toDateString()) return "I går";
            return date.toLocaleDateString('no-NO', { weekday: 'long', day: 'numeric', month: 'long' });
        }

        function renderAll() {
            renderLeaderboardAndChart();
            renderHistory();
            renderAdminLists();
            const sel = document.getElementById('userPerforming');
            sel.innerHTML = '<option value="">Hvem er du?</option>' + members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
        }

        function renderLeaderboardAndChart() {
            const statusEl = document.getElementById('leadStatus');
            const legendEl = document.getElementById('chartLegend');
            if (!members.length) { statusEl.innerText = "Legg til medlemmer!"; return; }
            statusEl.innerText = "Oversikt";
            const pointsMap = members.map(m => ({
                ...m,
                points: history.filter(h => h.userId === m.id).reduce((s, h) => s + h.points, 0)
            }));
            legendEl.innerHTML = pointsMap.map(m => `<div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full" style="background:${m.color}"></span>${m.name.split(' ')[0]}, ${m.points}p</div>`).join('');
            const ctx = document.getElementById('pointsChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: { datasets: [{ data: pointsMap.map(m => m.points || 1), backgroundColor: pointsMap.map(m => m.color), borderWidth: 0 }] },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        function renderHistory() {
            const hEl = document.getElementById('todayHistory');
            if (!history.length) { hEl.innerHTML = `<p class="text-center text-textSub text-sm py-10 opacity-50">Ingen bidrag ennå.</p>`; return; }
            let html = "", lastLabel = "";
            history.forEach(h => {
                const m = members.find(mem => mem.id === h.userId);
                if(!m) return;
                const dateLabel = getFriendlyDate(h.date);
                if (dateLabel !== lastLabel) {
                    html += `<h3 class="text-[11px] font-bold text-textSub uppercase tracking-widest mt-6 mb-2 ml-1">${dateLabel}</h3>`;
                    lastLabel = dateLabel;
                }
                html += `
                <div class="flex gap-4 items-center p-4 bg-cardBg rounded-2xl border border-white/5">
                    <span class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-xs" style="background:${m.color}">${m.name.substring(0,2).toUpperCase()}</span>
                    <div class="flex-1">
                        <p class="text-sm font-medium">${m.name.split(' ')[0]} har <span class="text-taskCyan">${h.tasks.join(', ')}</span></p>
                        <p class="text-[10px] text-textSub uppercase">+${h.points} poeng</p>
                    </div>
                    <button onclick="deleteHistory(${h.id})" class="text-textSub p-2"><i class="fas fa-times"></i></button>
                </div>`;
            });
            hEl.innerHTML = html;
        }

        function renderAdminLists() {
            const mList = document.getElementById('manageMembersList');
            mList.innerHTML = members.map(m => `
                <div class="flex justify-between items-center p-4 bg-appBg rounded-xl border border-white/5">
                    <div class="flex items-center gap-3">
                        <span class="w-3 h-3 rounded-full" style="background:${m.color}"></span>
                        <span class="text-sm font-bold">${m.name}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="openRenameModal('member', ${m.id})" class="text-textSub p-2"><i class="fas fa-ellipsis-v"></i></button>
                        <button onclick="deleteMember(${m.id})" class="text-red-500/50 p-2"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');

            const tList = document.getElementById('manageTasksList');
            tList.innerHTML = taskTypes.map(t => `
                <div class="flex justify-between items-center p-4 bg-appBg rounded-xl border border-white/5">
                    <span class="text-sm font-medium">${t.name} (${t.points}p)</span>
                    <div class="flex gap-2">
                        <button onclick="openRenameModal('task', ${t.id})" class="text-textSub p-2"><i class="fas fa-ellipsis-v"></i></button>
                        <button onclick="deleteTask(${t.id})" class="text-red-500/50 p-2"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function openRenameModal(type, id) {
            editTarget = {type, id};
            const item = type === 'member' ? members.find(m => m.id === id) : taskTypes.find(t => t.id === id);
            document.getElementById('renameInput').value = item.name;
            const pCont = document.getElementById('pointsEditContainer');
            if(type === 'task') {
                pCont.classList.remove('hidden');
                document.getElementById('renamePointsInput').value = item.points;
            } else {
                pCont.classList.add('hidden');
            }
            document.getElementById('renameModal').classList.remove('hidden');
        }

        function executeRename() {
            const val = document.getElementById('renameInput').value;
            if(!val) return;
            if(editTarget.type === 'member') {
                members.find(m => m.id === editTarget.id).name = val;
            } else {
                const t = taskTypes.find(x => x.id === editTarget.id);
                t.name = val;
                t.points = parseInt(document.getElementById('renamePointsInput').value) || 0;
            }
            sync(); closeRenameModal();
        }

        function showTaskSelection() { 
            document.getElementById('taskSelectionScreen').classList.remove('hidden'); 
            document.getElementById('mainScreen').classList.add('hidden'); 
            selectedTasksOnScreen = []; renderTaskBubbles(); 
        }
        function hideTaskSelection() { 
            document.getElementById('taskSelectionScreen').classList.add('hidden'); 
            document.getElementById('mainScreen').classList.remove('hidden'); 
        }
        function renderTaskBubbles() {
            document.getElementById('taskBubbleContainer').innerHTML = taskTypes.map(t => {
                const sel = selectedTasksOnScreen.includes(t.id);
                return `<button onclick="toggleT(${t.id})" class="px-5 py-4 rounded-2xl text-sm transition-all ${sel ? 'bg-taskCyan text-appBg font-bold' : 'bg-cardBg border border-white/5 text-textMain'}">${t.name} (${t.points}p)</button>`;
            }).join('');
        }
        function toggleT(id) {
            selectedTasksOnScreen = selectedTasksOnScreen.includes(id) ? selectedTasksOnScreen.filter(i => i !== id) : [...selectedTasksOnScreen, id];
            renderTaskBubbles();
        }
        function saveRegisteredTasks() {
            const uId = parseInt(document.getElementById('userPerforming').value);
            if(!uId || !selectedTasksOnScreen.length) return alert("Velg navn og oppgaver!");
            const tasks = selectedTasksOnScreen.map(id => taskTypes.find(t => t.id === id));
            const totalPoints = tasks.reduce((s, t) => s + t.points, 0);
            history.unshift({ id: Date.now(), userId: uId, tasks: tasks.map(t => t.name), points: totalPoints, date: new Date().toISOString() });
            sync(); hideTaskSelection();
        }
        function addMember() {
            const name = document.getElementById('newMemberName').value;
            if(!name) return;
            const colors = ['#EF4444', '#3B82F6', '#10B981', '#F59E0B', '#7C3AED'];
            members.push({ id: Date.now(), name, color: colors[members.length % colors.length] });
            document.getElementById('newMemberName').value = ""; sync();
        }
        function addTaskType() {
            const name = document.getElementById('newTaskName').value;
            const pts = parseInt(document.getElementById('newTaskPoints').value);
            if(!name || isNaN(pts)) return;
            taskTypes.push({ id: Date.now(), name, points: pts });
            document.getElementById('newTaskName').value = ""; document.getElementById('newTaskPoints').value = ""; sync();
        }
        function deleteMember(id) { members = members.filter(m => m.id !== id); sync(); }
        function deleteTask(id) { taskTypes = taskTypes.filter(t => t.id !== id); sync(); }
        function deleteHistory(id) { history = history.filter(h => h.id !== id); sync(); }
    </script>
</body>
</html>
